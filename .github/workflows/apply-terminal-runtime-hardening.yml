name: Apply terminal runtime hardening

on:
  push:
    branches:
      - agent/terminal-runtime-hardening

permissions:
  contents: write

concurrency:
  group: apply-terminal-runtime-hardening
  cancel-in-progress: true

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Apply asserted source changes
        run: python tools/_apply_terminal_runtime_hardening.py

      - name: Run focused ANSI regressions
        run: python -m unittest discover -s tests -p "test_ansi_basic.py" -v

      - name: Run focused window manager regressions
        run: python -m unittest discover -s tests -p "test_window_manager.py" -v

      - name: Run focused terminal component regressions
        run: python -m unittest discover -s tests -p "test_terminal_component.py" -v

      - name: Run repository quality checks
        run: python tools/qa.py --skip-tests

      - name: Reject undefined Python names
        run: python -m ruff check --select F821 retrotui tests tools

      - name: Run full unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run full pytest suite
        run: python -m pytest tests -q

      - name: Enforce module coverage floor
        run: >-
          python tools/report_module_coverage.py
          --quiet-tests
          --top 20
          --fail-under 75.0

      - name: Remove one-shot applicator
        run: |
          rm tools/_apply_terminal_runtime_hardening.py
          rm .github/workflows/apply-terminal-runtime-hardening.yml

      - name: Commit verified changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Harden OSC parsing, window close isolation and scrollback"
          git push
