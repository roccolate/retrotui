name: Apply core lifecycle hardening

on:
  push:
    branches:
      - agent/core-lifecycle-hardening
    paths:
      - tools/apply_core_lifecycle_hardening.py
      - .github/workflows/apply-core-lifecycle-hardening.yml
  pull_request:
    branches:
      - main
      - agent/secure-atomic-write
    paths:
      - tools/apply_core_lifecycle_hardening.py
      - .github/workflows/apply-core-lifecycle-hardening.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: agent/core-lifecycle-hardening
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Apply hardening patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tools/apply_core_lifecycle_hardening.py')
          text = path.read_text(encoding='utf-8')
          replacements = (
              (
                  'self.assertEqual(run.call_args.kwargs["input"], "secret\\n")',
                  'self.assertEqual(run.call_args.kwargs["input"], "secret\\\\n")',
              ),
              (
                  '        app.windows = []\n'
                  '        app.window_mgr = types.SimpleNamespace(close_window=mock.Mock(return_value=True))\n',
                  '        app.window_mgr = types.SimpleNamespace(\n'
                  '            windows=[],\n'
                  '            close_window=mock.Mock(return_value=True),\n'
                  '        )\n',
              ),
              (
                  'from _support import make_fake_curses\n\n'
                  'sys.modules["curses"] = make_fake_curses()\n\n',
                  '',
              ),
              (
                  '        tail = stat_line[close + 2 :].split()\n'
                  '        if len(tail) < 20:\n'
                  '            return None\n'
                  '        try:\n'
                  '            utime = int(tail[11])\n'
                  '            stime = int(tail[12])\n'
                  '            total_ticks = utime + stime\n'
                  '            start_time_ticks = int(tail[19])\n'
                  '        except (ValueError, IndexError):\n'
                  '            return None\n',
                  '        tail = stat_line[close + 2 :].split()\n'
                  '        if len(tail) < 13:\n'
                  '            return None\n'
                  '        try:\n'
                  '            utime = int(tail[11])\n'
                  '            stime = int(tail[12])\n'
                  '            total_ticks = utime + stime\n'
                  '        except (ValueError, IndexError):\n'
                  '            return None\n'
                  '        try:\n'
                  '            start_time_ticks = int(tail[19]) if len(tail) > 19 else 0\n'
                  '        except (ValueError, IndexError):\n'
                  '            start_time_ticks = 0\n',
              ),
          )
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f'applicator anchor not found exactly once: {old!r}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8', newline='\n')
          PY
          python tools/apply_core_lifecycle_hardening.py

          python - <<'PY'
          from pathlib import Path

          focused_path = Path('tests/test_core_lifecycle_hardening.py')
          focused = focused_path.read_text(encoding='utf-8')
          focused = focused.replace('from retrotui.core.app import RetroTUI\n', '', 1)
          start = focused.index(
              '    def test_cleanup_failure_remains_false_when_called_again(self):\n'
          )
          end = focused.index(
              '    def test_entrypoint_reports_incomplete_cleanup(self):\n',
              start,
          )
          focused = focused[:start] + focused[end:]
          focused_path.write_text(focused, encoding='utf-8', newline='\n')

          core_path = Path('tests/test_core_app.py')
          core = core_path.read_text(encoding='utf-8')
          anchor = (
              '    def test_draw_wrappers_delegate_to_rendering_helpers(self):\n'
              '        app = self._make_app()\n'
          )
          addition = (
              '    def test_cleanup_preserves_failed_result_across_repeated_calls(self):\n'
              '        app = self._make_app()\n'
              '        app._cleanup_complete = False\n'
              '        app._cleanup_started = False\n'
              '        app._file_ops = types.SimpleNamespace(\n'
              '            shutdown=mock.Mock(return_value=False),\n'
              '        )\n'
              '        app._restore_runtime_signal_handlers = mock.Mock()\n'
              '        app.windows = []\n'
              '\n'
              '        with mock.patch.object(\n'
              '            self.app_mod, "disable_mouse_support"\n'
              '        ):\n'
              '            first = app.cleanup()\n'
              '            second = app.cleanup()\n'
              '\n'
              '        self.assertFalse(first)\n'
              '        self.assertFalse(second)\n'
              '        app._file_ops.shutdown.assert_called_once_with(\n'
              '            timeout=app.BACKGROUND_OPERATION_JOIN_TIMEOUT\n'
              '        )\n'
              '\n'
              + anchor
          )
          if core.count(anchor) != 1:
              raise SystemExit('core cleanup test anchor not found exactly once')
          core_path.write_text(
              core.replace(anchor, addition, 1),
              encoding='utf-8',
              newline='\n',
          )
          PY

      - name: Run focused regressions
        id: focused
        continue-on-error: true
        shell: bash
        run: python -m unittest discover -s tests -p 'test_core_lifecycle_hardening.py' -v > focused-tests.log 2>&1

      - name: Upload focused regression diagnostics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: focused-hardening-tests
          path: focused-tests.log

      - name: Enforce focused regression result
        if: steps.focused.outcome == 'failure'
        shell: bash
        run: |
          cat focused-tests.log
          exit 1

      - name: Run repository QA
        run: python tools/qa.py --skip-tests

      - name: Reject undefined names
        run: python -m ruff check --select F821 retrotui tests tools

      - name: Run unittest suite
        id: unittest
        continue-on-error: true
        shell: bash
        run: python -m unittest discover -s tests -v > unittest.log 2>&1

      - name: Upload unittest diagnostics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: core-hardening-unittest
          path: unittest.log

      - name: Enforce unittest result
        if: steps.unittest.outcome == 'failure'
        shell: bash
        run: |
          tail -n 240 unittest.log
          exit 1

      - name: Run pytest suite
        run: python -m pytest tests -q

      - name: Enforce module coverage floor
        run: python tools/report_module_coverage.py --quiet-tests --top 20 --fail-under 75.0

      - name: Commit verified result
        shell: bash
        run: |
          git config user.name "roccolate"
          git config user.email "20898609+roccolate@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && { echo 'No changes produced'; exit 1; }
          git commit -m "Harden core lifecycle and process signaling"
          git push origin HEAD:agent/core-lifecycle-hardening
