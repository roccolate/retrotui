name: Apply current documentation sync

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: current-documentation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: ${{ github.head_ref == 'agent/sync-current-documentation' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: agent/sync-current-documentation
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Apply documentation sync
        run: python tools/apply_current_documentation_sync.py

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'

      - name: Run repository documentation and quality checks
        run: python tools/qa.py --skip-tests

      - name: Reject undefined Python names
        run: python -m ruff check --select F821 retrotui tests tools

      - name: Verify version sources were not changed
        shell: bash
        run: |
          git diff --exit-code -- pyproject.toml retrotui/__init__.py retrotui/core/app.py setup.sh

      - name: Publish verified documentation
        shell: bash
        run: |
          rm tools/apply_current_documentation_sync.py
          rm .github/workflows/apply-current-documentation-sync.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md ARCHITECTURE.md ROADMAP.md CHANGELOG.md CONTRIBUTING.md docs/PROJECT_STATUS.md
          git add -u tools/apply_current_documentation_sync.py .github/workflows/apply-current-documentation-sync.yml
          git commit -m 'Synchronize documentation with current main'
          git push origin HEAD:agent/sync-current-documentation
