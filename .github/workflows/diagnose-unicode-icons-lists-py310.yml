name: Diagnose Unicode icons lists Python 3.10

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    if: ${{ github.head_ref == 'agent/unicode-icons-lists' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'

      - name: Capture unittest diagnostics
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -v > py310-unittest.log 2>&1
          status=$?
          echo "exit_status=$status" >> py310-unittest.log
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: unicode-icons-lists-py310-unittest-log
          path: py310-unittest.log
