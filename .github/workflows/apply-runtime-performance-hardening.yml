name: Apply runtime performance hardening

on:
  push:
    branches:
      - agent/runtime-performance-hardening
    paths:
      - .github/workflows/apply-runtime-performance-hardening.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: agent/runtime-performance-hardening
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Apply performance patch
        run: python tools/apply_runtime_performance_hardening.py

      - name: Run focused regressions
        run: |
          python -m unittest tests.test_process_manager_more -v
          python -m unittest tests.test_event_loop -v
          python -m pytest tests/test_profile_metrics.py -q

      - name: Run repository QA
        run: python tools/qa.py --skip-tests

      - name: Reject undefined names
        run: python -m ruff check --select F821 retrotui tests tools

      - name: Run unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run pytest suite
        run: python -m pytest tests -q

      - name: Enforce module coverage floor
        run: python tools/report_module_coverage.py --quiet-tests --top 20 --fail-under 75.0

      - name: Commit verified permanent changes
        shell: bash
        run: |
          git config user.name "roccolate"
          git config user.email "20898609+roccolate@users.noreply.github.com"
          git add retrotui tests tools/baseline_extract.py docs/BASELINE_PROFILING.md
          git diff --cached --quiet && { echo 'No permanent changes produced'; exit 1; }
          git commit -m "Optimize runtime sampling and profiling"
          git push origin HEAD:agent/runtime-performance-hardening

# one-shot gate trigger
