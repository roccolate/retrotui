name: Apply lifecycle stabilization patch

on:
  push:
    branches:
      - stabilization/pre-0.9.6
    paths:
      - .github/workflows/apply-lifecycle-stabilization.yml

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stabilization/pre-0.9.6

      - name: Apply focused lifecycle patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(
                      f"expected exactly one match in {path}, found {count}: {old!r}"
                  )
              file_path.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "retrotui/core/app.py",
              "        self._shutdown_signal = None\n        self.window_mgr = WindowManager(self)\n",
              "        self._shutdown_signal = None\n"
              "        # Create the lifecycle bus before managers so events and\n"
              "        # subscriptions never depend on accidental access order.\n"
              "        self._event_bus = self.event_bus\n"
              "        self.window_mgr = WindowManager(self)\n",
          )

          replace_once(
              "retrotui/core/app.py",
              "            win.active = True\n            self.windows.append(win)\n",
              "            self._spawn_window(win)\n",
          )

          replace_once(
              "retrotui/core/app.py",
              "    def _spawn_window(self, win):\n"
              "        \"\"\"Append a window and make it active.\"\"\"\n"
              "        self.windows.append(win)\n"
              "        self.set_active_window(win)\n",
              "    def _spawn_window(self, win):\n"
              "        \"\"\"Open *win* through the authoritative lifecycle manager.\"\"\"\n"
              "        return self.window_mgr._spawn_window(win)\n",
          )

          replace_once(
              "retrotui/core/window_manager.py",
              "    def _emit_event(self, topic, win):\n"
              "        \"\"\"Publish a window lifecycle event on the app's bus (if available).\"\"\"\n"
              "        bus = getattr(self._app, '_event_bus', None)\n"
              "        if bus is not None:\n"
              "            bus.publish(topic, data={\n"
              "                \"window_id\": getattr(win, \"id\", None),\n"
              "                \"title\": getattr(win, \"title\", \"\"),\n"
              "            })\n",
              "    def _event_bus(self):\n"
              "        \"\"\"Return the app's public lifecycle bus, if an app is attached.\"\"\"\n"
              "        if self._app is None:\n"
              "            return None\n"
              "        return getattr(self._app, \"event_bus\", None)\n"
              "\n"
              "    def _emit_event(self, topic, win):\n"
              "        \"\"\"Publish a window lifecycle event on the app's public bus.\"\"\"\n"
              "        bus = self._event_bus()\n"
              "        if bus is not None:\n"
              "            bus.publish(topic, data={\n"
              "                \"window_id\": getattr(win, \"id\", None),\n"
              "                \"title\": getattr(win, \"title\", \"\"),\n"
              "            })\n",
          )

          replace_once(
              "retrotui/core/window_manager.py",
              "        if win.always_on_top:\n",
              "        if getattr(win, \"always_on_top\", False):\n",
          )

          replace_once(
              "retrotui/core/window_manager.py",
              "            if candidate.always_on_top:\n",
              "            if getattr(candidate, \"always_on_top\", False):\n",
          )

          replace_once(
              "retrotui/core/window_manager.py",
              "        normal = [w for w in self.windows if not w.always_on_top]\n"
              "        pinned = [w for w in self.windows if w.always_on_top]\n",
              "        normal = [w for w in self.windows if not getattr(w, \"always_on_top\", False)]\n"
              "        pinned = [w for w in self.windows if getattr(w, \"always_on_top\", False)]\n",
          )

          replace_once(
              "retrotui/core/window_manager.py",
              "        bus_sub = getattr(win, \"subscribe_to_bus\", None)\n"
              "        if callable(bus_sub):\n"
              "            bus = getattr(self._app, \"_event_bus\", None)\n"
              "            if bus is not None:\n"
              "                bus_sub(bus)\n",
              "        bus_sub = getattr(win, \"subscribe_to_bus\", None)\n"
              "        if callable(bus_sub):\n"
              "            bus = self._event_bus()\n"
              "            if bus is not None:\n"
              "                bus_sub(bus)\n",
          )
          PY

      - name: Run focused lifecycle tests
        run: |
          python -m unittest \
            tests.test_window_lifecycle_contract \
            tests.test_window_manager \
            tests.test_core_app

      - name: Check patch formatting
        run: git diff --check

      - name: Commit verified patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add retrotui/core/app.py retrotui/core/window_manager.py
          git commit -m "fix(core): unify window spawn lifecycle"
          git push origin HEAD:stabilization/pre-0.9.6
