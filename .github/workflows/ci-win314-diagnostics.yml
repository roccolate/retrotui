name: Windows 3.14 Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: python -m pip install -e ".[test]"

      - name: Capture Windows 3.14 failures
        continue-on-error: true
        shell: pwsh
        run: |
          python -m unittest discover -s tests -v *> unittest.log
          $unittestStatus = $LASTEXITCODE
          python -m pytest tests -q *> pytest.log
          $pytestStatus = $LASTEXITCODE
          "unittest_status=$unittestStatus" | Set-Content win314-diagnostics.txt
          "pytest_status=$pytestStatus" | Add-Content win314-diagnostics.txt
          "=== unittest tail ===" | Add-Content win314-diagnostics.txt
          Get-Content unittest.log -Tail 300 | Add-Content win314-diagnostics.txt
          "=== pytest tail ===" | Add-Content win314-diagnostics.txt
          Get-Content pytest.log -Tail 420 | Add-Content win314-diagnostics.txt

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: win314-diagnostics
          path: win314-diagnostics.txt
