name: Prune merged topic branches

on:
  pull_request:
    types: [synchronize, reopened]

permissions:
  contents: write

jobs:
  prune:
    if: >-
      github.event.pull_request.head.ref == 'agent/terminal-esc-reports-tabs' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout active branch
        uses: actions/checkout@v5
        with:
          ref: agent/terminal-esc-reports-tabs
          fetch-depth: 0

      - name: Delete absorbed and abandoned remote branches
        shell: bash
        run: |
          set -euo pipefail
          branches=(
            agent/terminal-dec-screen-controls
            agent/idle-redraw-and-wifi-worker
            agent/terminal-unicode-cells
            agent/charmap-status-compatibility
            agent/terminal-capability-contract
            fix/core-second-cut
            agent/terminal-vt-modes
            fix/core-first-cut
            agent/terminal-host-prefix
            hardening/transactional-trash
            hardening/cooperative-file-transfers
            hardening/core-worker-lifecycle
            hardening/core-contracts
            docs/current-project-status
            stabilization/pre-0.9.6
            agent/document-core-audit
            codex/add-ascii-video-player-to-retrotui
            tmp/test-tree-base
          )

          for branch in "${branches[@]}"; do
            case "$branch" in
              main|agent/terminal-esc-reports-tabs)
                echo "Refusing to delete protected branch: $branch" >&2
                exit 1
                ;;
            esac
            if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
              echo "Deleting $branch"
              git push origin --delete "$branch"
            else
              echo "Already absent: $branch"
            fi
          done

      - name: Remove one-shot workflow and push cleanup commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/prune-merged-branches.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Prune merged topic branches"
          git push origin HEAD:agent/terminal-esc-reports-tabs
