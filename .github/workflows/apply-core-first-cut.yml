name: Apply core first cut

on:
  push:
    branches:
      - fix/core-first-cut

permissions:
  contents: write

concurrency:
  group: apply-core-first-cut
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout hardening branch
        uses: actions/checkout@v5
        with:
          ref: fix/core-first-cut
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Apply guarded source and regression patch
        run: python tools/apply_core_first_cut.py

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'

      - name: Run repository quality checks
        run: python tools/qa.py --skip-tests

      - name: Reject undefined Python names
        run: python -m ruff check --select F821 retrotui tests tools

      - name: Run unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run pytest suite
        run: python -m pytest tests -q

      - name: Remove temporary applicator
        run: rm tools/apply_core_first_cut.py .github/workflows/apply-core-first-cut.yml

      - name: Commit verified first cut
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'fix: harden core extension and lifecycle boundaries'
          git push origin HEAD:fix/core-first-cut
