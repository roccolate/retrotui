name: Clean merged repository branches

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: ${{ github.head_ref == 'maintenance/branch-inventory' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Delete audited redundant branches
        shell: bash
        run: |
          set -euo pipefail
          branches=(
            'agent/classic-bottom-taskbar'
            'agent/control-panel-checkbox-clicks'
            'agent/terminal-runtime-hardening'
            'agent/unicode-icons-lists'
            'agent/unicode-menus-dialogs'
            'agent/unicode-window-chrome'
            'maintenance/branch-inventory'
          )

          : > branch-cleanup.txt
          for branch in "${branches[@]}"; do
            if git ls-remote --exit-code --heads origin "refs/heads/$branch" >/dev/null 2>&1; then
              git push origin --delete "$branch"
              printf 'deleted\t%s\n' "$branch" | tee -a branch-cleanup.txt
            else
              printf 'already-absent\t%s\n' "$branch" | tee -a branch-cleanup.txt
            fi
          done

          printf '\nremaining branches:\n' | tee -a branch-cleanup.txt
          git ls-remote --heads origin | sed 's#refs/heads/##' | tee -a branch-cleanup.txt

      - name: Upload cleanup report
        uses: actions/upload-artifact@v4
        with:
          name: branch-cleanup
          path: branch-cleanup.txt
