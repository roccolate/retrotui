name: Diagnose transactional trash on Windows

on:
  push:
    branches:
      - hardening/transactional-trash
    paths:
      - .github/workflows/diagnose-transactional-trash-windows.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/diagnose-transactional-trash-windows.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Capture unittest output
        shell: pwsh
        run: |
          python -m unittest discover -s tests -v *> windows-unittest.txt
          $code = $LASTEXITCODE
          Set-Content windows-unittest-status.txt $code
          exit 0

      - name: Capture pytest output
        shell: pwsh
        run: |
          python -m pytest tests -q *> windows-pytest.txt
          $code = $LASTEXITCODE
          Set-Content windows-pytest-status.txt $code
          exit 0

      - name: Upload diagnostic reports
        uses: actions/upload-artifact@v5
        with:
          name: transactional-trash-windows-diagnostics
          path: |
            windows-unittest.txt
            windows-unittest-status.txt
            windows-pytest.txt
            windows-pytest-status.txt
