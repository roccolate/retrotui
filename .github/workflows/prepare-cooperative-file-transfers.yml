name: Prepare cooperative file transfers

on:
  push:
    branches:
      - hardening/cooperative-file-transfers
    paths:
      - tools/prepare_cooperative_file_transfers.py
      - tools/repair_cooperative_preparer.py
      - tools/refine_cooperative_file_transfers.py
      - tools/refine_cooperative_file_transfers_strict.py
      - .github/workflows/prepare-cooperative-file-transfers.yml
  pull_request:
    branches:
      - hardening/core-worker-lifecycle
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    if: github.head_ref == 'hardening/cooperative-file-transfers' || github.ref == 'refs/heads/hardening/cooperative-file-transfers'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: hardening/cooperative-file-transfers

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Repair and apply deterministic patch
        run: |
          python tools/repair_cooperative_preparer.py
          python -m py_compile tools/prepare_cooperative_file_transfers_fixed.py
          python tools/prepare_cooperative_file_transfers_fixed.py
          python tools/refine_cooperative_file_transfers.py
          python tools/refine_cooperative_file_transfers_strict.py
          rm -f \
            tools/prepare_cooperative_file_transfers.py \
            tools/prepare_cooperative_file_transfers_fixed.py \
            tools/repair_cooperative_preparer.py \
            tools/refine_cooperative_file_transfers.py \
            tools/refine_cooperative_file_transfers_strict.py

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Capture repository QA report
        shell: bash
        run: |
          set +e
          python tools/qa.py --skip-tests > cooperative-qa.txt 2>&1
          status=$?
          echo "$status" > cooperative-qa-status.txt
          exit 0

      - name: Upload repository QA report
        uses: actions/upload-artifact@v5
        with:
          name: cooperative-file-transfer-qa-report
          path: |
            cooperative-qa.txt
            cooperative-qa-status.txt

      - name: Enforce repository QA
        shell: bash
        run: test "$(cat cooperative-qa-status.txt)" = "0"

      - name: Reject undefined names
        run: python -m ruff check --select F821 retrotui tests

      - name: Capture unittest report
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -v > cooperative-unittest.txt 2>&1
          status=$?
          echo "$status" > cooperative-unittest-status.txt
          exit 0

      - name: Upload unittest report
        uses: actions/upload-artifact@v5
        with:
          name: cooperative-file-transfer-unittest-report
          path: |
            cooperative-unittest.txt
            cooperative-unittest-status.txt

      - name: Enforce unittest suite
        shell: bash
        run: test "$(cat cooperative-unittest-status.txt)" = "0"

      - name: Run pytest suite
        run: python -m pytest tests -q

      - name: Enforce coverage floor
        run: >-
          python tools/report_module_coverage.py
          --quiet-tests
          --top 20
          --fail-under 75.0

      - name: Package validated payload
        run: |
          tar -czf cooperative-file-transfers.tar.gz \
            retrotui/core/file_transfer.py \
            retrotui/core/file_operations.py \
            retrotui/ui/dialog.py \
            retrotui/apps/filemanager/operations.py \
            retrotui/apps/filemanager/window.py \
            tests/test_file_transfer.py \
            tests/test_file_operation_progress.py

      - name: Upload validated payload
        uses: actions/upload-artifact@v5
        with:
          name: cooperative-file-transfers
          path: cooperative-file-transfers.tar.gz

      - name: Publish validated payload
        if: github.event_name == 'push'
        shell: bash
        run: |
          rm -f .github/workflows/prepare-cooperative-file-transfers.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            retrotui/core/file_transfer.py \
            retrotui/core/file_operations.py \
            retrotui/ui/dialog.py \
            retrotui/apps/filemanager/operations.py \
            retrotui/apps/filemanager/window.py \
            tests/test_file_transfer.py \
            tests/test_file_operation_progress.py
          git add -u tools .github/workflows
          git commit -m "Harden cooperative file transfers"
          git push origin HEAD:refs/heads/hardening/cooperative-file-transfers
