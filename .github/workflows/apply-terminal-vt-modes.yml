name: Apply terminal VT modes

on:
  push:
    branches:
      - agent/terminal-vt-modes
    paths:
      - .github/workflows/apply-terminal-vt-modes.yml
      - tools/apply_terminal_vt_modes.py

permissions:
  contents: write

concurrency:
  group: apply-terminal-vt-modes-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v5
        with:
          ref: agent/terminal-vt-modes
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Apply asserted patch
        run: python tools/apply_terminal_vt_modes.py

      - name: Install test dependencies
        run: python -m pip install -e ".[test]"

      - name: Validate focused slice
        run: |
          python tools/qa.py --skip-tests
          python -m ruff check --select F821 retrotui tests tools
          python -m unittest tests.test_terminal_component -v

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add retrotui/core/ansi.py retrotui/core/terminal_modes.py retrotui/apps/terminal.py tests/test_terminal_component.py ARCHITECTURE.md
          git commit -m "Strengthen terminal VT modes and bracketed paste"
          git push origin HEAD:agent/terminal-vt-modes

# Triggered intentionally after creating the stacked branch.
