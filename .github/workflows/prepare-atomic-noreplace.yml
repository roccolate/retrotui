name: Prepare atomic no-replace refinement

on:
  push:
    branches:
      - hardening/cooperative-file-transfers
    paths:
      - tools/apply_atomic_noreplace.py
      - .github/workflows/prepare-atomic-noreplace.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: hardening/cooperative-file-transfers

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Apply atomic no-replace patch
        run: python tools/apply_atomic_noreplace.py

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Repository QA
        run: python tools/qa.py --skip-tests

      - name: Reject undefined names
        run: python -m ruff check --select F821 retrotui tests

      - name: Run unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run pytest suite
        run: python -m pytest tests -q

      - name: Enforce coverage floor
        run: >-
          python tools/report_module_coverage.py
          --quiet-tests
          --top 20
          --fail-under 75.0

      - name: Publish validated refinement
        shell: bash
        run: |
          rm -f \
            tools/apply_atomic_noreplace.py \
            .github/workflows/prepare-atomic-noreplace.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            retrotui/core/file_transfer.py \
            tests/test_file_transfer.py
          git add -u tools .github/workflows
          git commit -m "Prevent transfer destination clobber races"
          git push origin HEAD:refs/heads/hardening/cooperative-file-transfers
