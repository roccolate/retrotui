name: One-shot branch cleanup

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-branch-cleanup.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Inventory and delete non-default branches
        id: cleanup
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo } = context.repo;
            const repository = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repository.data.default_branch;
            const branches = await github.paginate(
              github.rest.repos.listBranches,
              { owner, repo, per_page: 100 }
            );

            const inventory = {
              generated_at: new Date().toISOString(),
              repository: `${owner}/${repo}`,
              default_branch: defaultBranch,
              branches: branches.map((branch) => ({
                name: branch.name,
                sha: branch.commit.sha,
                protected: Boolean(branch.protected),
              })),
              deleted: [],
              failed: [],
            };

            for (const branch of branches) {
              if (branch.name === defaultBranch) continue;
              try {
                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${branch.name}`,
                });
                inventory.deleted.push({
                  name: branch.name,
                  sha: branch.commit.sha,
                });
                core.info(`Deleted branch ${branch.name} at ${branch.commit.sha}`);
              } catch (error) {
                inventory.failed.push({
                  name: branch.name,
                  sha: branch.commit.sha,
                  status: error.status || null,
                  message: error.message,
                });
                core.error(`Could not delete ${branch.name}: ${error.message}`);
              }
            }

            fs.writeFileSync(
              'branch-cleanup-inventory.json',
              JSON.stringify(inventory, null, 2) + '\n',
              'utf8'
            );

            await core.summary
              .addHeading('One-shot branch cleanup')
              .addRaw(`Default branch kept: ${defaultBranch}\n`)
              .addRaw(`Branches discovered: ${inventory.branches.length}\n`)
              .addRaw(`Branches deleted: ${inventory.deleted.length}\n`)
              .addRaw(`Failures: ${inventory.failed.length}\n`)
              .write();

            core.setOutput('failed_count', String(inventory.failed.length));
            if (inventory.failed.length) {
              core.setFailed(`Failed to delete ${inventory.failed.length} branch(es).`);
            }

      - name: Upload branch inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: branch-cleanup-inventory
          path: branch-cleanup-inventory.json
          retention-days: 7

      - name: Remove one-shot workflow from main
        if: steps.cleanup.outputs.failed_count == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const path = '.github/workflows/one-shot-branch-cleanup.yml';
            const repository = await github.rest.repos.get({ owner, repo });
            const branch = repository.data.default_branch;
            const current = await github.rest.repos.getContent({
              owner,
              repo,
              path,
              ref: branch,
            });
            await github.rest.repos.deleteFile({
              owner,
              repo,
              path,
              branch,
              sha: current.data.sha,
              message: 'Remove completed one-shot branch cleanup',
            });
            core.info('Removed the one-shot cleanup workflow from main.');
