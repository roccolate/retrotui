name: Apply core hardening

on:
  push:
    branches:
      - hardening/core-contracts
    paths:
      - tools/apply_core_hardening.py
      - tools/apply_core_hardening_f821.py
      - tools/refine_core_hardening.py
      - tools/refine_coverage_gate.py
      - .github/workflows/apply-core-hardening.yml
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'hardening/core-contracts' || github.ref == 'refs/heads/hardening/core-contracts'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hardening branch
        uses: actions/checkout@v5
        with:
          ref: hardening/core-contracts
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Apply deterministic patch
        run: |
          python tools/apply_core_hardening.py
          python tools/apply_core_hardening_f821.py
          python tools/refine_core_hardening.py
          python tools/refine_coverage_gate.py

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Repository QA
        run: python tools/qa.py --skip-tests

      - name: Capture undefined-name report
        shell: bash
        run: |
          set +e
          python -m ruff check --select F821 --output-format=concise retrotui tests tools > ruff-f821.txt
          status=$?
          cat ruff-f821.txt
          echo "RUFF_STATUS=$status" >> "$GITHUB_ENV"
          exit 0

      - name: Upload undefined-name report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ruff-f821-report
          path: ruff-f821.txt

      - name: Enforce undefined-name lint
        shell: bash
        run: test "${RUFF_STATUS}" -eq 0

      - name: Capture unittest report
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -v > unittest-report.txt 2>&1
          status=$?
          tail -n 120 unittest-report.txt
          echo "UNITTEST_STATUS=$status" >> "$GITHUB_ENV"
          exit 0

      - name: Upload unittest report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: unittest-report
          path: unittest-report.txt

      - name: Enforce unittest
        shell: bash
        run: test "${UNITTEST_STATUS}" -eq 0

      - name: pytest
        run: python -m pytest tests -q

      - name: Capture coverage baseline
        shell: bash
        run: |
          set +e
          python tools/report_module_coverage.py --quiet-tests --top 20 --fail-under 75.0 > coverage-report.txt 2>&1
          status=$?
          tail -n 80 coverage-report.txt
          echo "COVERAGE_STATUS=$status" >> "$GITHUB_ENV"
          exit 0

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage-report.txt

      - name: Enforce coverage floor
        shell: bash
        run: test "${COVERAGE_STATUS}" -eq 0

      - name: Commit validated code changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add retrotui tests tools/report_module_coverage.py pyproject.toml
          if git diff --cached --quiet; then
            echo "No validated code changes to commit."
            exit 0
          fi
          git commit --no-verify -m "Harden core close, focus, and validation contracts"
          git push origin HEAD:hardening/core-contracts
