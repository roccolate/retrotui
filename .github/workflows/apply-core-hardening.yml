name: Apply core hardening

on:
  push:
    branches:
      - hardening/core-contracts
    paths:
      - tools/apply_core_hardening.py
      - .github/workflows/apply-core-hardening.yml
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'hardening/core-contracts' || github.ref == 'refs/heads/hardening/core-contracts'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hardening branch
        uses: actions/checkout@v5
        with:
          ref: hardening/core-contracts
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Apply deterministic patch
        run: python tools/apply_core_hardening.py

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Repository QA
        run: python tools/qa.py --skip-tests

      - name: Undefined-name lint
        run: python -m ruff check --select F821 retrotui tests tools

      - name: unittest
        run: python -m unittest discover -s tests -v

      - name: pytest
        run: python -m pytest tests -q

      - name: Coverage floor
        run: python tools/report_module_coverage.py --quiet-tests --top 20 --fail-under 75.0

      - name: Commit validated hardening changes
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No patch changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add retrotui tests pyproject.toml .github/workflows/ci.yml .github/workflows/release.yml
          git commit -m "Harden core close, focus, and validation contracts"
          git push origin HEAD:hardening/core-contracts
