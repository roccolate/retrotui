name: Run direct core apps hardening

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: write
  issues: write

jobs:
  harden:
    if: github.event.issue.title == '[maintenance] run core apps hardening'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Mark maintenance run started
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "Core apps hardening run started on main."

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply and validate focused changes
        shell: bash
        run: |
          set -o pipefail
          {
            python tools/apply_core_apps_hardening.py
            python -m compileall -q retrotui tests
            python tools/qa.py
            python -m pip install --disable-pip-version-check pytest
            python -m pytest -q
          } 2>&1 | tee /tmp/core-apps-hardening.log

      - name: Report validation failure
        if: failure()
        shell: bash
        run: |
          {
            echo 'Core apps hardening failed. Last validation output:'
            echo
            echo '```text'
            tail -c 6000 /tmp/core-apps-hardening.log 2>/dev/null || true
            echo
            echo '```'
          } > /tmp/failure-comment.md
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body-file /tmp/failure-comment.md

      - name: Commit validated changes directly to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add retrotui tests
          git commit -m "Harden bundled app lifecycle, polling, and network safety"
          git push origin HEAD:main

      - name: Report success
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body "Core apps hardening passed QA and pytest and was committed directly to main."
