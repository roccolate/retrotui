name: Prepare transactional trash

on:
  push:
    branches:
      - hardening/transactional-trash
    paths:
      - tools/prepare_transactional_trash.py
      - tools/refine_transactional_trash.py
      - retrotui/core/trash_transaction.py
      - retrotui/apps/trash.py
      - tests/test_trash_transactions.py
      - .github/workflows/prepare-transactional-trash.yml
  pull_request:
    branches:
      - hardening/cooperative-file-transfers
    paths:
      - tools/prepare_transactional_trash.py
      - tools/refine_transactional_trash.py
      - retrotui/core/trash_transaction.py
      - retrotui/apps/trash.py
      - tests/test_trash_transactions.py
      - .github/workflows/prepare-transactional-trash.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    if: github.head_ref == 'hardening/transactional-trash' || github.ref == 'refs/heads/hardening/transactional-trash'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: hardening/transactional-trash

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Apply deterministic integration patch
        run: |
          python tools/prepare_transactional_trash.py
          python tools/refine_transactional_trash.py
          rm tools/prepare_transactional_trash.py tools/refine_transactional_trash.py
          python -m py_compile \
            retrotui/core/trash_transaction.py \
            retrotui/apps/trash.py \
            retrotui/apps/filemanager/operations.py \
            retrotui/apps/filemanager/window.py \
            retrotui/core/actions.py \
            retrotui/core/dialog_dispatch.py \
            retrotui/core/app.py \
            retrotui/core/file_operations.py \
            tests/test_filemanager_additional.py \
            tests/test_trash_transactions.py

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Repository QA
        run: python tools/qa.py --skip-tests

      - name: Reject undefined names
        run: python -m ruff check --select F821 retrotui tests tools

      - name: Capture unittest report
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -v > transactional-trash-unittest.txt 2>&1
          status=$?
          echo "$status" > transactional-trash-unittest-status.txt
          exit 0

      - name: Upload unittest report
        uses: actions/upload-artifact@v5
        with:
          name: transactional-trash-unittest-report
          path: |
            transactional-trash-unittest.txt
            transactional-trash-unittest-status.txt

      - name: Enforce unittest suite
        shell: bash
        run: test "$(cat transactional-trash-unittest-status.txt)" = "0"

      - name: Run pytest suite
        run: python -m pytest tests -q

      - name: Enforce coverage floor
        run: >-
          python tools/report_module_coverage.py
          --quiet-tests
          --top 20
          --fail-under 75.0

      - name: Package validated payload
        run: |
          tar -czf transactional-trash.tar.gz \
            retrotui/apps/filemanager/operations.py \
            retrotui/apps/filemanager/window.py \
            retrotui/apps/trash.py \
            retrotui/core/actions.py \
            retrotui/core/app.py \
            retrotui/core/dialog_dispatch.py \
            retrotui/core/file_operations.py \
            retrotui/core/trash_transaction.py \
            tests/test_filemanager_additional.py \
            tests/test_trash_transactions.py

      - name: Upload validated payload
        uses: actions/upload-artifact@v5
        with:
          name: transactional-trash
          path: transactional-trash.tar.gz

      - name: Materialize validated branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/hardening/transactional-trash'
        run: |
          rm .github/workflows/prepare-transactional-trash.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Materialize transactional trash hardening"
          git push origin HEAD:hardening/transactional-trash
          echo "commit=$(git rev-parse HEAD)" > transactional-trash-publication.txt
          echo "tree=$(git show -s --format=%T HEAD)" >> transactional-trash-publication.txt

      - name: Upload publication metadata
        if: github.event_name == 'push' && github.ref == 'refs/heads/hardening/transactional-trash'
        uses: actions/upload-artifact@v5
        with:
          name: transactional-trash-publication
          path: transactional-trash-publication.txt
