name: RetroNet Tabs Validation

on:
  pull_request:

permissions:
  contents: read

jobs:
  focused:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install package
        run: python -m pip install -e .
      - name: Run focused RetroNet tests
        run: python -m unittest discover -s tests -p 'test_retronet_tab_click_contract.py' -v
