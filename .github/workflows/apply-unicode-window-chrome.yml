name: Apply Unicode window chrome

on:
  push:
    branches:
      - agent/unicode-window-chrome

permissions:
  contents: write

concurrency:
  group: apply-unicode-window-chrome
  cancel-in-progress: false

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: agent/unicode-window-chrome
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          set -o pipefail
          : > .unicode-chrome-gate.log
          python -m pip install --upgrade pip 2>&1 | tee -a .unicode-chrome-gate.log
          python -m pip install -e ".[test]" 2>&1 | tee -a .unicode-chrome-gate.log

      - name: Apply asserted Unicode chrome changes
        run: |
          set -o pipefail
          python tools/apply_unicode_window_chrome.py 2>&1 | tee -a .unicode-chrome-gate.log

      - name: Run focused Unicode chrome regressions
        run: |
          set -o pipefail
          python -m unittest discover -s tests -p 'test_unicode_chrome.py' -v 2>&1 | tee -a .unicode-chrome-gate.log

      - name: Run repository quality checks
        run: |
          set -o pipefail
          python tools/qa.py --skip-tests 2>&1 | tee -a .unicode-chrome-gate.log

      - name: Reject undefined Python names
        run: |
          set -o pipefail
          python -m ruff check --select F821 retrotui tests tools 2>&1 | tee -a .unicode-chrome-gate.log

      - name: Run unittest suite
        run: |
          set -o pipefail
          python -m unittest discover -s tests -v 2>&1 | tee -a .unicode-chrome-gate.log

      - name: Run pytest suite
        run: |
          set -o pipefail
          python -m pytest tests -q 2>&1 | tee -a .unicode-chrome-gate.log

      - name: Enforce module coverage floor
        run: |
          set -o pipefail
          python tools/report_module_coverage.py --quiet-tests --top 20 --fail-under 75.0 2>&1 | tee -a .unicode-chrome-gate.log

      - name: Publish gate diagnostics on failure
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .unicode-chrome-gate.log
          git commit -m "Capture Unicode chrome gate failure" || true
          git push origin HEAD:agent/unicode-window-chrome

      - name: Publish verified permanent diff
        if: success()
        run: |
          rm tools/apply_unicode_window_chrome.py
          rm .github/workflows/apply-unicode-window-chrome.yml
          rm -f .unicode-chrome-gate.log
          test ! -e tools/apply_unicode_window_chrome.py
          test ! -e .github/workflows/apply-unicode-window-chrome.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use physical columns for Unicode window chrome"
          git push origin HEAD:agent/unicode-window-chrome
