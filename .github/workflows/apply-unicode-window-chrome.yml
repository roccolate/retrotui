name: Apply Unicode window chrome

on:
  push:
    branches:
      - agent/unicode-window-chrome

permissions:
  contents: write

concurrency:
  group: apply-unicode-window-chrome
  cancel-in-progress: false

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: agent/unicode-window-chrome
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Apply asserted Unicode chrome changes
        run: python tools/apply_unicode_window_chrome.py

      - name: Run focused Unicode chrome regressions
        run: python -m unittest tests.test_unicode_chrome -v

      - name: Run repository quality checks
        run: python tools/qa.py --skip-tests

      - name: Reject undefined Python names
        run: python -m ruff check --select F821 retrotui tests tools

      - name: Run unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run pytest suite
        run: python -m pytest tests -q

      - name: Enforce module coverage floor
        run: >-
          python tools/report_module_coverage.py
          --quiet-tests
          --top 20
          --fail-under 75.0

      - name: Publish verified permanent diff
        run: |
          rm tools/apply_unicode_window_chrome.py
          rm .github/workflows/apply-unicode-window-chrome.yml
          test ! -e tools/apply_unicode_window_chrome.py
          test ! -e .github/workflows/apply-unicode-window-chrome.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use physical columns for Unicode window chrome"
          git push origin HEAD:agent/unicode-window-chrome
