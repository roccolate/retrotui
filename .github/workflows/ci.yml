name: CI

on:
  push:
  pull_request:

jobs:
  validate-terminal-background-tick:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run focused tests
        run: |
          python -m unittest \
            tests.test_terminal_background_tick_contract \
            tests.test_event_loop \
            tests.test_terminal_component \
            tests.test_terminal_session

      - name: Check committed diff formatting
        run: git diff --check HEAD^ HEAD
