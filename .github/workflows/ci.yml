name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MODULE_COVERAGE_FAIL_UNDER: "75.0"

jobs:
  apply-windows-conpty-write-fix:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/windows-terminal-e2e'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout migration branch
        uses: actions/checkout@v5
        with:
          ref: agent/windows-terminal-e2e
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Apply exact ConPTY text-write fix
        run: python tools/apply_windows_conpty_write_fix.py

      - name: Validate focused terminal tests
        run: python -m unittest discover -s tests -p "test_terminal_session.py" -v

      - name: Validate repository quality
        run: |
          python tools/qa.py --skip-tests
          python -m ruff check --select F821 retrotui tests tools

      - name: Publish tested backend changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout HEAD -- .github/workflows/ci.yml
          git add retrotui/core/terminal_session.py tests/test_terminal_session.py
          git commit -m "Use pywinpty text writes"
          git push origin HEAD:agent/windows-terminal-e2e

  quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run real Windows ConPTY smoke test
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RETROTUI_WINDOWS_E2E: "1"
        run: |
          python -m unittest discover -s tests -p "test_windows_terminal_e2e.py" -v *> windows-conpty-e2e.log
          $code = $LASTEXITCODE
          Get-Content windows-conpty-e2e.log
          exit $code

      - name: Upload Windows ConPTY diagnostics
        if: failure() && runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-conpty-e2e-${{ matrix.python-version }}
          path: windows-conpty-e2e.log
          retention-days: 1

      - name: Run repository quality checks
        run: python tools/qa.py --skip-tests

      - name: Reject undefined Python names
        run: python -m ruff check --select F821 retrotui tests tools

      - name: Reject unused RetroTUI composition code
        run: python -m ruff check --select F401,F811,F841 retrotui/core/app.py

      - name: Run unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run pytest suite
        if: ${{ !cancelled() }}
        run: python -m pytest tests -q

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Enforce module coverage floor
        run: >-
          python tools/report_module_coverage.py
          --quiet-tests
          --top 20
          --fail-under "${{ env.MODULE_COVERAGE_FAIL_UNDER }}"
