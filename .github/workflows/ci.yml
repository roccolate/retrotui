name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  apply-event-loop-circuit-breaker:
    if: github.event_name == 'pull_request' && github.head_ref == 'stabilization/pre-0.9.6'
    runs-on: ubuntu-slim
    steps:
      - name: Checkout stabilization branch
        uses: actions/checkout@v5
        with:
          ref: stabilization/pre-0.9.6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install package
        run: python -m pip install -e .

      - name: Apply focused patch
        run: python tools/apply_event_loop_circuit_breaker_patch.py

      - name: Run focused tests
        run: |
          python -m unittest \
            tests.test_event_loop_circuit_breaker \
            tests.test_event_loop \
            tests.test_redraw_contract \
            tests.test_terminal_background_tick_contract

      - name: Check patch formatting
        run: git diff --check

      - name: Commit verified patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add retrotui/core/event_loop.py
          git commit -m "fix(core): add event loop circuit breaker"
          git push origin HEAD:stabilization/pre-0.9.6
