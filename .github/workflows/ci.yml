name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply_final_changelog:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stabilization branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Prepend completed stabilization entry
        run: python tools/prepend_pre096_changelog.py

      - name: Verify documentation references
        run: |
          test -f docs/STABILIZATION_PRE_0.9.6.md
          grep -q "stabilization complete" CHANGELOG.md
          grep -q "STABILIZATION_PRE_0.9.6" README.md
          grep -q "Paridad del backend Windows" ROADMAP.md

      - name: Commit changelog only
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: record completed pre-v0.9.6 stabilization"

      - name: Push validated changelog
        shell: bash
        run: git push origin HEAD:${{ github.event.pull_request.head.ref }}
