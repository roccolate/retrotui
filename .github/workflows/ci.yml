name: CI

on:
  pull_request:

permissions:
  contents: write

env:
  MODULE_COVERAGE_FAIL_UNDER: "75.0"

jobs:
  apply_windows_backend_parity:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    steps:
      - name: Checkout stabilization branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply Windows PTY parity contract
        run: python tools/apply_windows_backend_parity.py

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[test]"

      - name: Compile changed modules
        run: python -m py_compile retrotui/core/terminal_session.py tests/test_terminal_windows_parity.py

      - name: Run focused Windows PTY tests
        run: python -m unittest tests.test_terminal_windows_parity -v

      - name: Run terminal session regressions
        run: python -m unittest tests.test_terminal_session -v

      - name: Run unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run pytest suite
        run: python -m pytest tests -q

      - name: Commit validated runtime and tests
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add retrotui/core/terminal_session.py tests/test_terminal_windows_parity.py
          git commit -m "terminal: complete Windows PTY backend parity"

      - name: Push validated runtime and tests
        shell: bash
        run: git push origin HEAD:${{ github.event.pull_request.head.ref }}
