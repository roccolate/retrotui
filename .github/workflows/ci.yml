name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MODULE_COVERAGE_FAIL_UNDER: "75.0"

jobs:
  quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run repository quality checks
        run: python tools/qa.py --skip-tests

      - name: Reject undefined Python names
        run: python -m ruff check --select F821 retrotui tests tools

      - name: Reject unused RetroTUI composition code
        run: python -m ruff check --select F401,F811,F841 retrotui/core/app.py

      - name: Run unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run pytest suite
        if: ${{ !cancelled() }}
        run: python -m pytest tests -q

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Enforce module coverage floor
        run: >-
          python tools/report_module_coverage.py
          --quiet-tests
          --top 20
          --fail-under "${{ env.MODULE_COVERAGE_FAIL_UNDER }}"
