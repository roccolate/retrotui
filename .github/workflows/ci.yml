name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MODULE_COVERAGE_FAIL_UNDER: "75.0"

jobs:
  apply-core-code-cleanup:
    if: >-
      github.event_name == 'pull_request' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cleanup branch
        uses: actions/checkout@v5
        with:
          ref: agent/core-code-cleanup-v2
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Apply conservative cleanup
        run: |
          python tools/apply_core_code_cleanup.py
          python tools/fix_cleanup_test_owners.py

      - name: Run repository quality checks
        run: python tools/qa.py --skip-tests

      - name: Reject undefined Python names
        run: python -m ruff check --select F821 retrotui tests tools

      - name: Reject unused RetroTUI composition code
        run: python -m ruff check --select F401,F811,F841 retrotui/core/app.py

      - name: Run complete unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run complete pytest suite
        run: python -m pytest tests -q

      - name: Enforce module coverage floor
        run: >-
          python tools/report_module_coverage.py
          --quiet-tests
          --top 20
          --fail-under "${{ env.MODULE_COVERAGE_FAIL_UNDER }}"

      - name: Commit verified permanent changes
        shell: bash
        run: |
          git config user.name "roccolate"
          git config user.email "20898609+roccolate@users.noreply.github.com"
          git add retrotui/core/app.py tests/test_core_app.py
          git diff --cached --quiet && { echo 'No permanent changes produced'; exit 1; }
          git commit -m "Clean dead RetroTUI composition code"
          git push --force-with-lease origin HEAD:agent/core-code-cleanup-v2

  quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run repository quality checks
        run: python tools/qa.py --skip-tests

      - name: Reject undefined Python names
        run: python -m ruff check --select F821 retrotui tests tools

      - name: Run unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run pytest suite
        if: ${{ !cancelled() }}
        run: python -m pytest tests -q

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Enforce module coverage floor
        run: >-
          python tools/report_module_coverage.py
          --quiet-tests
          --top 20
          --fail-under "${{ env.MODULE_COVERAGE_FAIL_UNDER }}"
