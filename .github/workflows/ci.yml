name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  apply-close-transaction:
    if: github.event_name == 'pull_request' && github.head_ref == 'stabilization/pre-0.9.6'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stabilization branch
        uses: actions/checkout@v5
        with:
          ref: stabilization/pre-0.9.6

      - name: Apply focused patch
        run: python tools/apply_close_transaction_patch.py

      - name: Run focused tests
        run: |
          python -m unittest \
            tests.test_close_lifecycle_contract \
            tests.test_window_manager \
            tests.test_notepad_component \
            tests.test_dialog_dispatch \
            tests.test_core_app

      - name: Check patch formatting
        run: git diff --check

      - name: Commit verified patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            retrotui/ui/window.py \
            retrotui/core/window_manager.py \
            retrotui/core/app.py \
            retrotui/core/dialog_dispatch.py \
            retrotui/apps/notepad.py
          git commit -m "fix(core): make window close transactional"
          git push origin HEAD:stabilization/pre-0.9.6
