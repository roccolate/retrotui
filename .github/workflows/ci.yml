name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MODULE_COVERAGE_FAIL_UNDER: "75.0"

jobs:
  diagnose-runtime-performance:
    if: >-
      github.event_name == 'pull_request' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout hardening branch
        uses: actions/checkout@v5
        with:
          ref: agent/runtime-performance-hardening

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run complete suites with diagnostics
        id: suites
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -v 2>&1 | tee runtime-performance-unittest.log
          unittest_status=${PIPESTATUS[0]}
          python -m pytest tests -q 2>&1 | tee runtime-performance-pytest.log
          pytest_status=${PIPESTATUS[0]}
          printf 'unittest=%s\npytest=%s\n' "$unittest_status" "$pytest_status" \
            > runtime-performance-status.txt
          if [ "$unittest_status" -ne 0 ] || [ "$pytest_status" -ne 0 ]; then
            exit 1
          fi

      - name: Upload suite diagnostics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: runtime-performance-full-suite
          path: |
            runtime-performance-unittest.log
            runtime-performance-pytest.log
            runtime-performance-status.txt

      - name: Enforce complete suite result
        if: steps.suites.outcome != 'success'
        run: exit 1

  quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run repository quality checks
        run: python tools/qa.py --skip-tests

      - name: Reject undefined Python names
        run: python -m ruff check --select F821 retrotui tests tools

      - name: Run unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run pytest suite
        if: ${{ !cancelled() }}
        run: python -m pytest tests -q

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Enforce module coverage floor
        run: >-
          python tools/report_module_coverage.py
          --quiet-tests
          --top 20
          --fail-under "${{ env.MODULE_COVERAGE_FAIL_UNDER }}"
