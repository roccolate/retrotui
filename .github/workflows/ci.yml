name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  apply-redraw-contract:
    if: github.event_name == 'pull_request' && github.head_ref == 'stabilization/pre-0.9.6'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stabilization branch
        uses: actions/checkout@v5
        with:
          ref: stabilization/pre-0.9.6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install package
        run: python -m pip install -e .

      - name: Apply focused patch
        run: python tools/apply_redraw_contract_patch.py

      - name: Run focused tests
        id: focused
        shell: bash
        run: |
          set +e
          python -m unittest \
            tests.test_redraw_contract \
            tests.test_event_loop \
            tests.test_filemanager_component \
            tests.test_filemanager_preview_and_ops \
            tests.test_clock_component \
            tests.test_terminal_background_tick_contract \
            > redraw-contract-tests.log 2>&1
          code=$?
          cat redraw-contract-tests.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload redraw diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: redraw-contract-diagnostics
          path: redraw-contract-tests.log

      - name: Preserve focused result
        shell: bash
        run: test "${{ steps.focused.outputs.exit_code }}" = "0"

      - name: Verify legacy runtime flags are gone
        shell: bash
        run: |
          ! grep -R "needs_redraw\|_animated" \
            retrotui/core/event_loop.py \
            retrotui/ui/window.py \
            retrotui/apps/filemanager/window.py \
            examples/plugins

      - name: Check patch formatting
        run: git diff --check

      - name: Commit verified patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            retrotui/core/event_loop.py \
            retrotui/ui/window.py \
            retrotui/plugins/base.py \
            retrotui/apps/filemanager/window.py \
            retrotui/apps/clock.py \
            examples/plugins/pomodoro/__init__.py \
            examples/plugins/starwars-ascii/__init__.py \
            examples/plugins/matrix-rain/__init__.py \
            examples/plugins/network-monitor/__init__.py \
            examples/plugins/game-of-life/__init__.py \
            examples/plugins/ascii-aquarium/__init__.py \
            examples/plugins/system-monitor/__init__.py
          git commit -m "refactor(core): unify redraw scheduling contract"
          git push origin HEAD:stabilization/pre-0.9.6
