name: CI

on:
  push:
  pull_request:

env:
  MODULE_COVERAGE_FAIL_UNDER: "75.0"

jobs:
  update-lifecycle-contract-test:
    if: github.event_name == 'pull_request' && github.head_ref == 'stabilization/pre-0.9.6'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout stabilization branch
        uses: actions/checkout@v5
        with:
          ref: stabilization/pre-0.9.6

      - name: Update legacy facade expectation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/test_core_app.py")
          text = path.read_text(encoding="utf-8")
          old = '''        win = types.SimpleNamespace(active=False)
        app.set_active_window = mock.Mock()

        self.assertEqual(app._next_window_offset(10, 5), (14, 7))
        app._spawn_window(win)
        self.assertIn(win, app.windows)
        app.set_active_window.assert_called_once_with(win)
'''
          new = '''        win = types.SimpleNamespace(active=False)
        app.window_mgr._spawn_window = mock.Mock()

        self.assertEqual(app._next_window_offset(10, 5), (14, 7))
        app._spawn_window(win)
        app.window_mgr._spawn_window.assert_called_once_with(win)
'''
          if text.count(old) != 1:
              raise SystemExit("legacy spawn facade expectation was not found exactly once")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Run complete QA
        run: python tools/qa.py

      - name: Check patch formatting
        run: git diff --check

      - name: Commit verified test update
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_core_app.py
          git commit -m "test(core): align spawn facade contract"
          git push origin HEAD:stabilization/pre-0.9.6
