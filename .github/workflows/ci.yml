name: CI

on:
  push:
  pull_request:

env:
  MODULE_COVERAGE_FAIL_UNDER: "75.0"

jobs:
  apply_windows_path_fix:
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install -e ".[test]"
          python -m pip install windows-curses

      - name: Compare temporary files by identity
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          path = Path("tests/test_hexviewer_component.py")
          text = path.read_text(encoding="utf-8")
          old = "        self.assertEqual(win.filepath, path)"
          new = "        self.assertTrue(os.path.samefile(win.filepath, path))"
          if text.count(old) != 1:
              raise SystemExit("expected exactly one Hex Viewer path assertion")
          path.write_text(text.replace(old, new), encoding="utf-8")
          '@ | python -

      - name: Compile updated test
        run: python -m py_compile tests/test_hexviewer_component.py

      - name: Run unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run pytest suite
        run: python -m pytest tests -q

      - name: Commit validated path fix
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_hexviewer_component.py
          git commit -m "test(hexviewer): compare temporary paths by identity"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Install windows-curses (Windows, Python < 3.14)
        if: runner.os == 'Windows' && matrix.python-version != '3.14'
        run: python -m pip install windows-curses

      - name: Run repository quality checks
        run: python tools/qa.py --skip-tests

      - name: Run unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run pytest suite
        if: ${{ !cancelled() }}
        run: python -m pytest tests -q
