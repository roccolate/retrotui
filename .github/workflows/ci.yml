name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  apply-close-transaction:
    if: github.event_name == 'pull_request' && github.head_ref == 'stabilization/pre-0.9.6'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stabilization branch
        uses: actions/checkout@v5
        with:
          ref: stabilization/pre-0.9.6

      - name: Preserve source escape sequences
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("tools/apply_close_transaction_patch.py")
          text = path.read_text(encoding="utf-8")
          path.write_text(text.replace("\n    '''", "\n    r'''"), encoding="utf-8")
          PY

      - name: Apply focused patch
        run: |
          python tools/apply_close_transaction_patch.py
          python tools/apply_close_test_adjustment.py

      - name: Run focused tests
        run: |
          python -m unittest \
            tests.test_close_lifecycle_contract \
            tests.test_window_manager \
            tests.test_notepad_component \
            tests.test_dialog_dispatch \
            tests.test_core_app.CoreAppTests.test_cleanup_calls_window_close_hooks_and_handles_errors \
            tests.test_core_app.CoreAppTests.test_spawn_window_and_offset_helpers

      - name: Check patch formatting
        run: git diff --check

      - name: Commit verified patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            retrotui/ui/window.py \
            retrotui/core/window_manager.py \
            retrotui/core/app.py \
            retrotui/core/dialog_dispatch.py \
            retrotui/apps/notepad.py \
            tests/test_core_app.py
          git commit -m "fix(core): make window close transactional"
          git push origin HEAD:stabilization/pre-0.9.6
