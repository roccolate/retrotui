name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply_partial_pty_writes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stabilization branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Apply queued partial-write contract
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          def replace_once(path, old, new):
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old!r}")
              file_path.write_text(text.replace(old, new), encoding="utf-8")

          session_path = Path("retrotui/core/terminal_session.py")
          session_text = session_path.read_text(encoding="utf-8")
          session_text = session_text.replace(
              "_DEFAULT_READ_BUDGET = 8192\n",
              "_DEFAULT_READ_BUDGET = 8192\n_DEFAULT_WRITE_BUDGET = 8192\n",
              1,
          )
          session_text = session_text.replace(
              "        self._decoder = codecs.getincrementaldecoder(\"utf-8\")(\"replace\")\n",
              "        self._decoder = codecs.getincrementaldecoder(\"utf-8\")(\"replace\")\n"
              "        self._pending_write = bytearray()\n",
              1,
          )

          start_marker = "    def write(self, data):\n"
          end_marker = "    def send_signal(self, sig):\n"
          if session_text.count(start_marker) != 1 or session_text.count(end_marker) != 1:
              raise SystemExit("terminal_session.py: write block markers mismatch")
          prefix, remainder = session_text.split(start_marker, 1)
          _old_write, suffix = remainder.split(end_marker, 1)
          new_write = dedent('''
              @property
              def pending_write_bytes(self):
                  """Return the number of queued input bytes awaiting the PTY."""
                  return len(self._pending_write)

              def write(self, data):
                  """Accept a complete input payload and queue any unsent suffix.

                  The return value is the number of bytes accepted by the session,
                  not necessarily the number synchronously written to the backend.
                  """
                  if self._win_pty is None and self.master_fd is None:
                      return 0
                  if isinstance(data, str):
                      payload = data.encode("utf-8", errors="replace")
                  else:
                      payload = bytes(data)
                  if not payload:
                      return 0
                  self._pending_write.extend(payload)
                  self.flush_pending_writes()
                  return len(payload)

              def flush_pending_writes(self, max_total_bytes=_DEFAULT_WRITE_BUDGET):
                  """Flush queued input without exceeding one service-tick budget."""
                  budget = max(0, int(max_total_bytes))
                  if budget == 0 or not self._pending_write:
                      return 0
                  if self._win_pty is None and self.master_fd is None:
                      return 0

                  total = 0
                  while self._pending_write and total < budget:
                      chunk = bytes(self._pending_write[:budget - total])
                      try:
                          if self._win_pty is not None:
                              written = self._write_windows(chunk)
                          else:
                              written = os.write(self.master_fd, chunk)
                      except BlockingIOError:
                          break
                      except OSError as exc:
                          if exc.errno in (errno.EAGAIN, errno.EWOULDBLOCK):
                              break
                          if exc.errno in (errno.EIO, errno.EPIPE, errno.EBADF):
                              self.running = False
                          raise

                      if written is None:
                          written = len(chunk)
                      written = max(0, min(int(written), len(chunk)))
                      if written == 0:
                          break
                      del self._pending_write[:written]
                      total += written
                  return total

              def _write_windows(self, data):
                  """Write one queued chunk to Windows ConPTY."""
                  payload = data.encode("utf-8", errors="replace") if isinstance(data, str) else bytes(data)
                  try:
                      result = self._win_pty.write(payload)
                  except OSError:
                      self.running = False
                      return 0
                  if isinstance(result, int):
                      return max(0, min(result, len(payload)))
                  return len(payload)

          ''').replace("\n", "\n    ", 0)
          # dedent yields top-level methods; indent the whole replacement into TerminalSession.
          new_write = "".join(
              ("    " + line if line else line) + "\n"
              for line in new_write.strip("\n").split("\n")
          ) + "\n"
          session_text = prefix + new_write + end_marker + suffix
          session_path.write_text(session_text, encoding="utf-8")

          replace_once(
              "retrotui/core/terminal_session.py",
              "            self._win_pty = None\n            self.running = False\n            return\n",
              "            self._win_pty = None\n            self._pending_write.clear()\n            self.running = False\n            return\n",
          )
          replace_once(
              "retrotui/core/terminal_session.py",
              "            self.master_fd = None\n        self.running = False\n",
              "            self.master_fd = None\n        self._pending_write.clear()\n        self.running = False\n",
          )
          replace_once(
              "retrotui/apps/terminal.py",
              "                chunk = self._session.read()\n",
              "                flush_writes = getattr(self._session, 'flush_pending_writes', None)\n"
              "                if callable(flush_writes):\n"
              "                    flush_writes()\n"
              "                chunk = self._session.read()\n",
          )

          Path("tests/test_terminal_partial_writes.py").write_text(dedent('''
              import errno
              import types
              import unittest
              from unittest import mock

              from retrotui.apps.terminal import TerminalWindow
              from retrotui.core import terminal_session


              class TerminalPartialWriteTests(unittest.TestCase):
                  def test_default_budget_queues_large_suffix(self):
                      session = terminal_session.TerminalSession()
                      session.master_fd = 7
                      payload = b"x" * (terminal_session._DEFAULT_WRITE_BUDGET + 5)

                      with mock.patch.object(
                          terminal_session.os, "write", side_effect=lambda _fd, data: len(data)
                      ) as writer:
                          accepted = session.write(payload)
                          self.assertEqual(accepted, len(payload))
                          self.assertEqual(session.pending_write_bytes, 5)
                          self.assertEqual(
                              len(writer.call_args_list[0].args[1]),
                              terminal_session._DEFAULT_WRITE_BUDGET,
                          )
                          self.assertEqual(session.flush_pending_writes(), 5)

                      self.assertEqual(session.pending_write_bytes, 0)

                  def test_partial_write_and_eagain_preserve_unsent_suffix(self):
                      session = terminal_session.TerminalSession()
                      session.master_fd = 8
                      again = BlockingIOError(errno.EAGAIN, "again")

                      with mock.patch.object(
                          terminal_session.os, "write", side_effect=[2, again, 2]
                      ) as writer:
                          self.assertEqual(session.write(b"abcd"), 4)
                          self.assertEqual(session.pending_write_bytes, 2)
                          self.assertEqual(writer.call_args_list[0].args[1], b"abcd")
                          self.assertEqual(writer.call_args_list[1].args[1], b"cd")
                          self.assertEqual(session.flush_pending_writes(), 2)
                          self.assertEqual(writer.call_args_list[2].args[1], b"cd")

                      self.assertEqual(session.pending_write_bytes, 0)

                  def test_zero_flush_budget_does_not_touch_backend(self):
                      session = terminal_session.TerminalSession()
                      session.master_fd = 9
                      session._pending_write.extend(b"queued")

                      with mock.patch.object(terminal_session.os, "write") as writer:
                          self.assertEqual(session.flush_pending_writes(0), 0)

                      writer.assert_not_called()
                      self.assertEqual(session.pending_write_bytes, 6)

                  def test_hard_write_error_marks_session_stopped_and_keeps_queue(self):
                      session = terminal_session.TerminalSession()
                      session.master_fd = 10
                      session.running = True
                      broken = OSError(errno.EPIPE, "closed")

                      with mock.patch.object(terminal_session.os, "write", side_effect=broken):
                          with self.assertRaises(OSError):
                              session.write(b"data")

                      self.assertFalse(session.running)
                      self.assertEqual(session.pending_write_bytes, 4)

                  def test_windows_partial_result_is_queued(self):
                      backend = types.SimpleNamespace(write=mock.Mock(side_effect=[2, 0, None]))
                      session = terminal_session.TerminalSession()
                      session._win_pty = backend

                      self.assertEqual(session.write(b"abcd"), 4)
                      self.assertEqual(session.pending_write_bytes, 2)
                      self.assertEqual(backend.write.call_args_list[0].args[0], b"abcd")
                      self.assertEqual(backend.write.call_args_list[1].args[0], b"cd")
                      self.assertEqual(session.flush_pending_writes(), 2)
                      self.assertEqual(backend.write.call_args_list[2].args[0], b"cd")
                      self.assertEqual(session.pending_write_bytes, 0)

                  def test_terminal_tick_flushes_pending_input_before_read(self):
                      win = TerminalWindow(1, 1, 40, 12)
                      win.body_rect = lambda: (2, 2, 30, 8)
                      win._ensure_session = lambda: None
                      calls = []
                      win._session = types.SimpleNamespace(
                          resize=mock.Mock(),
                          flush_pending_writes=mock.Mock(side_effect=lambda: calls.append("flush")),
                          read=mock.Mock(side_effect=lambda: calls.append("read") or ""),
                          poll_exit=mock.Mock(return_value=False),
                      )

                      self.assertFalse(win.tick())
                      self.assertEqual(calls, ["flush", "read"])

                  def test_close_discards_pending_input(self):
                      session = terminal_session.TerminalSession()
                      session.master_fd = 11
                      session._pending_write.extend(b"queued")

                      with mock.patch.object(terminal_session.os, "close"):
                          session.close()

                      self.assertEqual(session.pending_write_bytes, 0)


              if __name__ == "__main__":
                  unittest.main()
          ''').lstrip(), encoding="utf-8")
          PY

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[test]"

      - name: Compile changed modules
        run: python -m py_compile retrotui/core/terminal_session.py retrotui/apps/terminal.py tests/test_terminal_partial_writes.py

      - name: Run focused partial-write tests
        run: python -m unittest tests.test_terminal_partial_writes -v

      - name: Run unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run pytest suite
        run: python -m pytest tests -q

      - name: Restore permanent CI workflow
        run: git show a6f7abca0b97e2fb0f681b8a1d2a270fadbc6934:.github/workflows/ci.yml > .github/workflows/ci.yml

      - name: Commit validated partial-write contract
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "terminal: queue partial PTY writes"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
