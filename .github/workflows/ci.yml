name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  apply-terminal-background-tick:
    if: github.event_name == 'pull_request' && github.head_ref == 'stabilization/pre-0.9.6'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stabilization branch
        uses: actions/checkout@v5
        with:
          ref: stabilization/pre-0.9.6

      - name: Apply focused patch
        run: python tools/apply_terminal_background_tick_patch.py

      - name: Run focused tests
        run: |
          python -m unittest \
            tests.test_terminal_background_tick_contract \
            tests.test_event_loop \
            tests.test_terminal_component \
            tests.test_terminal_session

      - name: Check patch formatting
        run: git diff --check

      - name: Commit verified patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            retrotui/core/event_loop.py \
            retrotui/apps/terminal.py \
            tests/test_terminal_component.py
          git commit -m "fix(terminal): keep PTY draining while minimized"
          git push origin HEAD:stabilization/pre-0.9.6
