name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MODULE_COVERAGE_FAIL_UNDER: "75.0"

jobs:
  apply-runtime-performance:
    if: >-
      github.event_name == 'pull_request' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout hardening branch
        uses: actions/checkout@v5
        with:
          ref: agent/runtime-performance-hardening
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Apply zero-overhead profiling guard
        run: python tools/apply_runtime_profile_overhead_guard.py

      - name: Run focused regressions
        id: focused
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            python -m unittest discover -s tests -p 'test_event_loop.py' -v
            python -m pytest tests/test_profile_metrics.py -q
          } 2>&1 | tee focused-performance-tests.log

      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: runtime-performance-focused-tests
          path: focused-performance-tests.log

      - name: Enforce focused regression result
        if: steps.focused.outcome != 'success'
        run: exit 1

      - name: Commit permanent changes
        shell: bash
        run: |
          git config user.name "roccolate"
          git config user.email "20898609+roccolate@users.noreply.github.com"
          git add retrotui/core/event_loop.py tests/test_event_loop.py
          git diff --cached --quiet && { echo 'No permanent changes produced'; exit 1; }
          git commit -m "Avoid profiling overhead when disabled"
          git push origin HEAD:agent/runtime-performance-hardening

  quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run repository quality checks
        run: python tools/qa.py --skip-tests

      - name: Reject undefined Python names
        run: python -m ruff check --select F821 retrotui tests tools

      - name: Run unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run pytest suite
        if: ${{ !cancelled() }}
        run: python -m pytest tests -q

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Enforce module coverage floor
        run: >-
          python tools/report_module_coverage.py
          --quiet-tests
          --top 20
          --fail-under "${{ env.MODULE_COVERAGE_FAIL_UNDER }}"
