name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply_partial_pty_writes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stabilization branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply queued partial-write contract
        run: python tools/apply_partial_pty_writes.py

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[test]"

      - name: Compile changed modules
        run: python -m py_compile retrotui/core/terminal_session.py retrotui/apps/terminal.py tests/test_terminal_partial_writes.py

      - name: Run focused partial-write tests
        run: python -m unittest tests.test_terminal_partial_writes -v

      - name: Run terminal session regressions
        run: python -m unittest tests.test_terminal_session -v

      - name: Run terminal component regressions
        run: python -m unittest tests.test_terminal_component -v

      - name: Run unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run pytest suite
        run: python -m pytest tests -q

      - name: Restore permanent CI and remove patcher
        run: |
          git show a6f7abca0b97e2fb0f681b8a1d2a270fadbc6934:.github/workflows/ci.yml > .github/workflows/ci.yml
          git rm tools/apply_partial_pty_writes.py

      - name: Commit validated partial-write contract
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "terminal: queue partial PTY writes"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
