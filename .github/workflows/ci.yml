name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MODULE_COVERAGE_FAIL_UNDER: "75.0"

jobs:
  apply-idle-runtime-cut:
    if: >-
      github.ref == 'refs/heads/agent/idle-redraw-and-wifi-worker' &&
      github.event.head_commit.message == 'ci: apply idle runtime hardening cut'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: agent/idle-redraw-and-wifi-worker
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Apply focused source changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          event_loop_path = Path("retrotui/core/event_loop.py")
          event_loop = event_loop_path.read_text(encoding="utf-8")

          marker = "def _tick_and_probe_windows(app):\n"
          helper = '''def _visible_notification_signature(notifications):
              """Return the identity of the currently rendered toast stack."""
              try:
                  toasts = tuple(notifications.visible_toasts)
              except (AttributeError, TypeError):
                  return ()
              return tuple(
                  (id(toast), getattr(toast, "created_at", None))
                  for toast in toasts
              )


          def _tick_notifications(app):
              """Advance toast expiry and invalidate only on visible changes."""
              previous = getattr(app, "_notification_visible_signature", ())
              notifications = getattr(app, "_notifications", None)
              if notifications is None:
                  if previous:
                      app._notification_visible_signature = ()
                      return True
                  return False

              tick = getattr(notifications, "tick", None)
              expired = bool(tick()) if callable(tick) else False
              signature = _visible_notification_signature(notifications)
              app._notification_visible_signature = signature
              return expired or signature != previous


          def _tick_and_probe_windows(app):
          '''
          if marker not in event_loop:
              raise SystemExit("event-loop insertion marker not found")
          event_loop = event_loop.replace(marker, helper, 1)

          old_notif_loop = '''                _notif = getattr(app, "_notifications", None)
                          if _notif is not None:
                              if _notif.tick():
                                  app._dirty = True
                              if _notif.has_visible:
                                  app._dirty = True
          '''
          new_notif_loop = '''                if _tick_notifications(app):
                              app._dirty = True
          '''
          if old_notif_loop not in event_loop:
              raise SystemExit("notification loop block not found")
          event_loop = event_loop.replace(old_notif_loop, new_notif_loop, 1)
          event_loop_path.write_text(event_loop, encoding="utf-8")

          wifi_path = Path("retrotui/apps/wifi_manager.py")
          wifi = wifi_path.read_text(encoding="utf-8")

          old_refresh = '''    def refresh(self):
                  if not self.nmcli or not self.radio_on:
                      return
          '''
          new_refresh = '''    def refresh(self):
                  nmcli = self.nmcli
                  if not nmcli or not self.radio_on:
                      return
          '''
          if old_refresh not in wifi:
              raise SystemExit("wifi refresh block not found")
          wifi = wifi.replace(old_refresh, new_refresh, 1)

          old_start = '''        thread = self._start_worker(
                      self._scan_worker,
                      name='retrotui-wifi-scan',
                  )
          '''
          new_start = '''        thread = self._start_worker(
                      self._scan_worker,
                      nmcli,
                      name='retrotui-wifi-scan',
                  )
          '''
          if old_start not in wifi:
              raise SystemExit("wifi worker start block not found")
          wifi = wifi.replace(old_start, new_start, 1)

          old_worker = '''    def _scan_worker(self, cancel_event=None):
                  # Preserve direct helper calls used by integrations/tests while the
                  # runtime path receives the owner scope's cancellation event.
                  if cancel_event is None:
                      cancel_event = threading.Event()
                  new_networks = []
                  error_message = None
                  try:
                      if cancel_event.is_set():
                          return
                      subprocess.run(
                          [self.nmcli, "dev", "wifi", "rescan"],
          '''
          new_worker = '''    def _scan_worker(self, cancel_event=None, nmcli=None):
                  # Preserve direct helper calls used by integrations/tests while the
                  # runtime path receives the owner scope's cancellation event. The
                  # executable is captured by refresh() so later attribute changes
                  # cannot turn an in-flight argv entry into None.
                  if cancel_event is None:
                      cancel_event = threading.Event()
                  executable = nmcli or self.nmcli
                  new_networks = []
                  error_message = None
                  try:
                      if cancel_event.is_set():
                          return
                      if not executable:
                          raise OSError("nmcli is unavailable")
                      subprocess.run(
                          [executable, "dev", "wifi", "rescan"],
          '''
          if old_worker not in wifi:
              raise SystemExit("wifi scan worker block not found")
          wifi = wifi.replace(old_worker, new_worker, 1)

          old_listing = '''                [self.nmcli, "-t", "-f", "SSID,SIGNAL,SECURITY,IN-USE,BSSID", "dev", "wifi"],
          '''
          new_listing = '''                [executable, "-t", "-f", "SSID,SIGNAL,SECURITY,IN-USE,BSSID", "dev", "wifi"],
          '''
          if old_listing not in wifi:
              raise SystemExit("wifi listing argv not found")
          wifi = wifi.replace(old_listing, new_listing, 1)
          wifi_path.write_text(wifi, encoding="utf-8")

          wifi_tests_path = Path("tests/test_wifi_manager.py")
          wifi_tests = wifi_tests_path.read_text(encoding="utf-8")
          old_draw_test = '''    def test_draw_handles_no_nmcli(self):
                  win = self.mod.WifiManagerWindow(0, 0, 60, 20)
                  # Force nmcli absence
                  win.nmcli = None
          '''
          new_draw_test = '''    def test_draw_handles_no_nmcli(self):
                  with mock.patch.object(self.mod.shutil, "which", return_value=None):
                      win = self.mod.WifiManagerWindow(0, 0, 60, 20)
                  # Preserve the no-backend state without launching a real scan.
                  win.nmcli = None
          '''
          if old_draw_test not in wifi_tests:
              raise SystemExit("wifi draw test block not found")
          wifi_tests_path.write_text(
              wifi_tests.replace(old_draw_test, new_draw_test, 1),
              encoding="utf-8",
          )

          Path("tests/test_idle_runtime_regressions.py").write_text(
              '''import types
          import unittest
          from unittest import mock

          from retrotui.apps.wifi_manager import WifiManagerWindow
          from retrotui.core.event_loop import _tick_notifications


          class IdleRuntimeRegressionTests(unittest.TestCase):
              def test_notification_stack_invalidates_once_until_state_changes(self):
                  toast = types.SimpleNamespace(created_at=1.0)
                  notifications = types.SimpleNamespace(
                      tick=mock.Mock(return_value=False),
                      visible_toasts=[toast],
                  )
                  app = types.SimpleNamespace(_notifications=notifications)

                  self.assertTrue(_tick_notifications(app))
                  self.assertFalse(_tick_notifications(app))

                  notifications.visible_toasts = []
                  self.assertTrue(_tick_notifications(app))
                  self.assertFalse(_tick_notifications(app))

              def test_notification_expiry_requests_one_redraw(self):
                  notifications = types.SimpleNamespace(
                      tick=mock.Mock(side_effect=[True, False]),
                      visible_toasts=[],
                  )
                  app = types.SimpleNamespace(_notifications=notifications)

                  self.assertTrue(_tick_notifications(app))
                  self.assertFalse(_tick_notifications(app))

              def test_scan_worker_uses_captured_executable_after_attribute_change(self):
                  with mock.patch(
                      "retrotui.apps.wifi_manager.shutil.which",
                      return_value=None,
                  ):
                      win = WifiManagerWindow(0, 0, 60, 20)
                  win.nmcli = None
                  win._scan_in_progress = True
                  rescan = types.SimpleNamespace(returncode=0, stdout="", stderr="")
                  listing = types.SimpleNamespace(returncode=0, stdout="", stderr="")

                  with mock.patch(
                      "retrotui.apps.wifi_manager.subprocess.run",
                      side_effect=[rescan, listing],
                  ) as run_mock:
                      win._scan_worker(None, "/usr/bin/nmcli")

                  self.assertEqual(
                      run_mock.call_args_list[0].args[0][0],
                      "/usr/bin/nmcli",
                  )
                  self.assertEqual(
                      run_mock.call_args_list[1].args[0][0],
                      "/usr/bin/nmcli",
                  )
                  self.assertFalse(win._scan_in_progress)
                  self.assertEqual(win._status_msg, "Scan complete.")

              def test_refresh_passes_captured_executable_to_worker_scope(self):
                  with mock.patch(
                      "retrotui.apps.wifi_manager.shutil.which",
                      return_value=None,
                  ):
                      win = WifiManagerWindow(0, 0, 60, 20)
                  win.nmcli = "/usr/bin/nmcli"
                  win.radio_on = True

                  with mock.patch.object(
                      win,
                      "_start_worker",
                      return_value=object(),
                  ) as start:
                      win.refresh()

                  self.assertEqual(start.call_args.args[1], "/usr/bin/nmcli")


          if __name__ == "__main__":
              unittest.main()
          ''',
              encoding="utf-8",
          )
          PY

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run focused regressions
        run: >-
          python -m pytest -q
          tests/test_idle_runtime_regressions.py
          tests/test_wifi_manager.py
          tests/test_event_loop.py
          tests/test_notifications.py

      - name: Run repository gates
        run: |
          python tools/qa.py --skip-tests
          python -m ruff check --select F821 retrotui tests tools
          python -m unittest discover -s tests -q
          python -m pytest tests -q

      - name: Commit validated cut and restore CI
        shell: bash
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/ci.yml retrotui/core/event_loop.py retrotui/apps/wifi_manager.py tests/test_wifi_manager.py tests/test_idle_runtime_regressions.py
          git commit -m "Harden idle redraw and WiFi worker state"
          git push origin HEAD:agent/idle-redraw-and-wifi-worker

  quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run repository quality checks
        run: python tools/qa.py --skip-tests

      - name: Reject undefined Python names
        run: python -m ruff check --select F821 retrotui tests tools

      - name: Run unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run pytest suite
        if: ${{ !cancelled() }}
        run: python -m pytest tests -q

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Enforce module coverage floor
        run: >-
          python tools/report_module_coverage.py
          --quiet-tests
          --top 20
          --fail-under "${{ env.MODULE_COVERAGE_FAIL_UNDER }}"
