name: CI Test Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install -e ".[test]"

      - name: Apply fixes in diagnostic workspace
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              if text.count(old) != 1:
                  raise SystemExit(f"unexpected match count in {path}")
              p.write_text(text.replace(old, new), encoding="utf-8")

          def replace_count(path, old, new, expected):
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              if text.count(old) != expected:
                  raise SystemExit(f"unexpected match count in {path}")
              p.write_text(text.replace(old, new), encoding="utf-8")

          replace_once("retrotui/plugins/loader.py", "import importlib.util\nfrom pathlib import Path\n", "import importlib.util\nimport logging\nfrom pathlib import Path\n")
          replace_once("retrotui/plugins/loader.py", "from pathlib import Path\n\n_PLUGIN_IMPORT_ERRORS", "from pathlib import Path\n\nLOGGER = logging.getLogger(__name__)\n\n_PLUGIN_IMPORT_ERRORS")
          replace_once("tests/test_charmap_basic.py", 'assert w.status_message.startswith("Block:")', 'assert w._status_message.startswith("Block:")')
          replace_once("tests/test_core_app.py", 'self.assertEqual(app.config.icon_style, "mini")', 'self.assertEqual(app.config.icon_style, "retro_01")')
          replace_once("tests/test_core_app.py", 'self.assertEqual(self.app_mod.RetroTUI._normalize_icon_style("retro_01"), "mini")', 'self.assertEqual(self.app_mod.RetroTUI._normalize_icon_style("retro_01"), "retro_01")')
          replace_once("tests/test_core_app.py", 'self.assertEqual(self.app_mod.RetroTUI._normalize_icon_style("MINI"), "mini")', 'self.assertEqual(self.app_mod.RetroTUI._normalize_icon_style("MINI"), "retro_01")')
          replace_once("tests/test_terminal_buffer_wiring.py", "    def _resize_buffers(self, rows, cols=20):\n        self.win._normal_buf.resize(rows, cols)\n        self.win._alt_buf.resize(rows, cols)\n", "    def _resize_buffers(self, rows, cols=20):\n        # Keep the mocked viewport in sync so _consume_output() does not\n        # immediately resize the buffers back to the constructor dimensions.\n        self.win.body_rect.return_value = (4, 5, cols + 1, rows + 1)\n        self.win._normal_buf.resize(rows, cols)\n        self.win._alt_buf.resize(rows, cols)\n")
          replace_once("tests/test_terminal_mouse_passthrough.py", '        for ch in "abcdefghij":\n            self.win._consume_output(ch + "\\n")\n', '        for idx in range(self.win._normal_buf.rows + 3):\n            self.win._consume_output(f"{idx}\\n")\n')
          replace_count("tests/test_windows_logic.py", "            'retrotui.apps.filemanager',\n", "            'retrotui.apps.filemanager.window',\n            'retrotui.apps.filemanager',\n", 2)
          replace_once("retrotui/apps/terminal.py", "        self.ansi = AnsiStateMachine()\n        self._scroll_lines = []\n        self._line_cells = []\n        self._cursor_col = 0\n        # The fresh child has not re-enabled mouse reporting yet.\n", "        self.ansi = AnsiStateMachine()\n        self._scroll_lines = []\n        self._normal_buf.clear_screen(\"all\")\n        self._alt_buf.clear_screen(\"all\")\n        self._screen.set_alt_screen(False)\n        self._screen.set_cursor(0, 0)\n        # The fresh child has not re-enabled mouse reporting yet.\n")
          PY

      - name: Capture compact post-fix diagnostics
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -v > unittest.log 2>&1
          unittest_status=$?
          python -m pytest tests -q > pytest.log 2>&1
          pytest_status=$?
          {
            echo "unittest_status=${unittest_status}"
            echo "pytest_status=${pytest_status}"
            echo "=== unittest tail ==="
            tail -n 120 unittest.log
            echo "=== pytest tail ==="
            tail -n 300 pytest.log
          } > post-fix-diagnostics.txt

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: post-fix-diagnostics
          path: post-fix-diagnostics.txt
