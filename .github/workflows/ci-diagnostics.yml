name: CI Test Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install -e ".[test]"

      - name: Capture compact test diagnostics
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -v > unittest.log 2>&1
          unittest_status=$?
          python -m pytest tests -q > pytest.log 2>&1
          pytest_status=$?
          {
            echo "unittest_status=${unittest_status}"
            echo "pytest_status=${pytest_status}"
            echo "=== unittest tail ==="
            tail -n 160 unittest.log
            echo "=== pytest tail ==="
            tail -n 160 pytest.log
          } > test-diagnostics.txt

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: test-diagnostics.txt
