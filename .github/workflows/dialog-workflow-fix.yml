name: Dialog Workflow Fix

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose_dialog_patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Capture patch mismatch
        continue-on-error: true
        shell: bash
        run: |
          python tools/apply_dialog_workflow_fix.py > dialog-patch.log 2>&1
          echo "status=$?" >> dialog-patch.log

      - name: Upload patch diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: dialog-patch-diagnostics
          path: dialog-patch.log
