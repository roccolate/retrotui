name: Dialog Workflow Fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply_dialog_workflow_fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[test]"

      - name: Apply typed dialog workflow contract
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}")
              p.write_text(text.replace(old, new), encoding="utf-8")

          Path("retrotui/core/dialog_workflow.py").write_text('''"""Explicit workflow metadata for application-level dialogs."""
          from __future__ import annotations

          from enum import Enum


          class DialogWorkflowId(str, Enum):
              """Stable identifiers for application-level dialog workflows."""

              EXIT = "app.exit"
              SAVE_CONFIRM = "document.save_confirm"
              CALLBACK = "dialog.callback"


          def bind_dialog(
              dialog,
              *,
              workflow_id,
              source_window=None,
              on_accept=None,
              on_cancel=None,
          ):
              """Attach explicit workflow ownership and callbacks to *dialog*."""
              if isinstance(workflow_id, DialogWorkflowId):
                  workflow_id = workflow_id.value
              dialog.workflow_id = str(workflow_id)
              dialog.source_window = source_window
              dialog.source_window_id = getattr(source_window, "id", None)
              dialog.on_accept = on_accept
              dialog.on_cancel = on_cancel
              return dialog
          ''', encoding="utf-8")

          dispatcher = Path("retrotui/core/dialog_dispatch.py")
          text = dispatcher.read_text(encoding="utf-8")
          marker = "    def resolve_dialog_result(self, result_idx):\n"
          if text.count(marker) != 1:
              raise SystemExit("dialog_dispatch.py: resolve marker mismatch")
          prefix = text.split(marker, 1)[0]
          replacement = '''    def _dialog_source_is_live(self, dialog):
              """Return whether the dialog's captured source is still registered."""
              source = getattr(dialog, 'source_window', None)
              if source is None:
                  return True
              try:
                  windows = getattr(self._app, 'windows')
              except (AttributeError, TypeError):
                  # Minimal test scaffolding may not expose a window registry.
                  return True
              if windows is None:
                  return True
              expected_id = getattr(dialog, 'source_window_id', None)
              try:
                  for win in windows:
                      if win is source:
                          return expected_id is None or getattr(win, 'id', None) == expected_id
              except TypeError:
                  return True
              return False

              @staticmethod
              def _dialog_callback(dialog, accepted):
                  callback = getattr(dialog, 'on_accept' if accepted else 'on_cancel', None)
                  if callback is None and accepted:
                      # Compatibility for existing third-party dialogs.
                      callback = getattr(dialog, 'callback', None)
                  return callback

              def resolve_dialog_result(self, result_idx):
                  """Resolve a dialog through explicit workflow metadata."""
                  if result_idx < 0 or not self._app.dialog:
                      return

                  dialog = self._app.dialog
                  accepted = result_idx == 0
                  source = getattr(dialog, 'source_window', None)
                  source_live = self._dialog_source_is_live(dialog)
                  callback_result = None
                  callback = self._dialog_callback(dialog, accepted)

                  if callable(callback):
                      if source is not None and not source_live:
                          LOGGER.warning(
                              'Ignoring dialog workflow %r for closed source window %r',
                              getattr(dialog, 'workflow_id', None),
                              source,
                          )
                      elif accepted and hasattr(dialog, 'value'):
                          callback_result = callback(dialog.value)
                      else:
                          callback_result = callback()

                  if self._app.dialog is dialog:
                      self._app.dialog = None

                  if callback_result is not None:
                      dispatch_source = source if source_live else None
                      app_dispatch = getattr(self._app, '_dispatch_window_result', None)
                      if callable(app_dispatch):
                          app_dispatch(callback_result, dispatch_source)
                      else:
                          self.dispatch_window_result(callback_result, dispatch_source)
          '''
          dispatcher.write_text(prefix + replacement, encoding="utf-8")

          replace_once(
              "retrotui/core/action_runner.py",
              "from .actions import AppAction\n",
              "from .actions import AppAction\nfrom .dialog_workflow import DialogWorkflowId, bind_dialog\n",
          )
          replace_once(
              "retrotui/core/action_runner.py",
              '''    if action == AppAction.EXIT:
                  app.dialog = Dialog(
                      "Exit RetroTUI",
                      "Are you sure you want to exit?\\n\\nAll windows will be closed.",
                      ["Yes", "No"],
                      width=44,
                  )
                  return
          ''',
              '''    if action == AppAction.EXIT:
                  app.dialog = bind_dialog(
                      Dialog(
                          "Exit RetroTUI",
                          "Are you sure you want to exit?\\n\\nAll windows will be closed.",
                          ["Yes", "No"],
                          width=44,
                      ),
                      workflow_id=DialogWorkflowId.EXIT,
                      on_accept=lambda: setattr(app, "running", False),
                  )
                  return
          ''',
          )

          replace_once(
              "retrotui/core/app.py",
              "from .dialog_dispatch import DialogDispatcher\n",
              "from .dialog_dispatch import DialogDispatcher\nfrom .dialog_workflow import DialogWorkflowId, bind_dialog\n",
          )
          replace_once(
              "retrotui/core/app.py",
              '''        self.dialog = Dialog(
                      title="Discard unsaved changes?",
                      message=message,
                      buttons=["Discard", "Cancel"],
                      width=58,
                  )
                  self.dialog.kind = "save_confirm"
                  self.dialog.source_window = win
                  self._pending_discard_callback = on_discard
                  self._pending_discard_cancel_callback = on_cancel
                  self._pending_discard_source = win
          ''',
              '''        self.dialog = bind_dialog(
                      Dialog(
                          title="Discard unsaved changes?",
                          message=message,
                          buttons=["Discard", "Cancel"],
                          width=58,
                      ),
                      workflow_id=DialogWorkflowId.SAVE_CONFIRM,
                      source_window=win,
                      on_accept=on_discard,
                      on_cancel=on_cancel,
                  )
          ''',
          )

          replace_once(
              "retrotui/core/file_operations.py",
              "from .actions import ActionResult, ActionType\n",
              "from .actions import ActionResult, ActionType\nfrom .dialog_workflow import DialogWorkflowId, bind_dialog\n",
          )
          replace_once(
              "retrotui/core/file_operations.py",
              '''        dialog = InputDialog(title, prompt, width=width, **dialog_kwargs)
                  dialog.callback = lambda value, target=win: getattr(target, callback_method)(value)
                  self._app.dialog = dialog
          ''',
              '''        self._app.dialog = bind_dialog(
                      InputDialog(title, prompt, width=width, **dialog_kwargs),
                      workflow_id=DialogWorkflowId.CALLBACK,
                      source_window=win,
                      on_accept=lambda value, target=win: getattr(target, callback_method)(value),
                  )
          ''',
          )
          replace_once(
              "retrotui/core/file_operations.py",
              '''        dialog = InputDialog('Rename', prompt, initial_value=entry.name, width=56)
                  dialog.callback = lambda new_name, target=win: target.rename_selected(new_name)
                  self._app.dialog = dialog
          ''',
              '''        self._app.dialog = bind_dialog(
                      InputDialog('Rename', prompt, initial_value=entry.name, width=56),
                      workflow_id=DialogWorkflowId.CALLBACK,
                      source_window=win,
                      on_accept=lambda new_name, target=win: target.rename_selected(new_name),
                  )
          ''',
          )
          replace_once(
              "retrotui/core/file_operations.py",
              '''        dialog = Dialog('Confirm Delete', message, ['Delete', 'Cancel'], width=58)
                  dialog.callback = lambda target=win: self._app._run_file_operation_with_progress(
                      target,
                      operation='delete',
                  )
                  self._app.dialog = dialog
          ''',
              '''        self._app.dialog = bind_dialog(
                      Dialog('Confirm Delete', message, ['Delete', 'Cancel'], width=58),
                      workflow_id=DialogWorkflowId.CALLBACK,
                      source_window=win,
                      on_accept=lambda target=win: self._app._run_file_operation_with_progress(
                          target,
                          operation='delete',
                      ),
                  )
          ''',
          )
          replace_once(
              "retrotui/core/file_operations.py",
              '''        dialog = Dialog('Empty Trash', message, ['Empty', 'Cancel'], width=64)
                  empty = getattr(win, 'empty_trash', None)
                  if callable(empty):
                      dialog.callback = lambda target=win: target.empty_trash()
                  self._app.dialog = dialog
          ''',
              '''        empty = getattr(win, 'empty_trash', None)
                  self._app.dialog = bind_dialog(
                      Dialog('Empty Trash', message, ['Empty', 'Cancel'], width=64),
                      workflow_id=DialogWorkflowId.CALLBACK,
                      source_window=win,
                      on_accept=(lambda target=win: target.empty_trash()) if callable(empty) else None,
                  )
          ''',
          )
          replace_once(
              "retrotui/core/file_operations.py",
              '''        dialog = InputDialog('Copy To', prompt, initial_value=win.current_path, width=62)
                  dialog.callback = lambda dest, target=win: self._app._run_file_operation_with_progress(
                      target,
                      operation='copy',
                      destination=dest,
                  )
                  self._app.dialog = dialog
          ''',
              '''        self._app.dialog = bind_dialog(
                      InputDialog('Copy To', prompt, initial_value=win.current_path, width=62),
                      workflow_id=DialogWorkflowId.CALLBACK,
                      source_window=win,
                      on_accept=lambda dest, target=win: self._app._run_file_operation_with_progress(
                          target,
                          operation='copy',
                          destination=dest,
                      ),
                  )
          ''',
          )
          replace_once(
              "retrotui/core/file_operations.py",
              '''        dialog = InputDialog('Move To', prompt, initial_value=win.current_path, width=62)
                  dialog.callback = lambda dest, target=win: self._app._run_file_operation_with_progress(
                      target,
                      operation='move',
                      destination=dest,
                  )
                  self._app.dialog = dialog
          ''',
              '''        self._app.dialog = bind_dialog(
                      InputDialog('Move To', prompt, initial_value=win.current_path, width=62),
                      workflow_id=DialogWorkflowId.CALLBACK,
                      source_window=win,
                      on_accept=lambda dest, target=win: self._app._run_file_operation_with_progress(
                          target,
                          operation='move',
                          destination=dest,
                      ),
                  )
          ''',
          )
          replace_once(
              "retrotui/core/file_operations.py",
              '''        dialog = Dialog(title, message, ['Kill', 'Cancel'], width=58)
                  dialog.callback = (
                      lambda target=win, data=data: target.kill_process(data)
                      if callable(getattr(target, 'kill_process', None))
                      else ActionResult(ActionType.ERROR, 'Window does not support process kill.')
                  )
                  self._app.dialog = dialog
          ''',
              '''        self._app.dialog = bind_dialog(
                      Dialog(title, message, ['Kill', 'Cancel'], width=58),
                      workflow_id=DialogWorkflowId.CALLBACK,
                      source_window=win,
                      on_accept=(
                          lambda target=win, data=data: target.kill_process(data)
                          if callable(getattr(target, 'kill_process', None))
                          else ActionResult(ActionType.ERROR, 'Window does not support process kill.')
                      ),
                  )
          ''',
          )

          replace_once(
              "retrotui/core/viewer.py",
              "from .actions import ActionResult, ActionType\n",
              "from .actions import ActionResult, ActionType\nfrom .dialog_workflow import DialogWorkflowId, bind_dialog\n",
          )
          replace_once(
              "retrotui/core/viewer.py",
              '''    dialog = InputDialog('RetroNet Explorer', 'Enter URL:', initial_value=initial, width=64)
              dialog.callback = source_win.open_path
              app.dialog = dialog
          ''',
              '''    app.dialog = bind_dialog(
                  InputDialog('RetroNet Explorer', 'Enter URL:', initial_value=initial, width=64),
                  workflow_id=DialogWorkflowId.CALLBACK,
                  source_window=source_win,
                  on_accept=source_win.open_path,
              )
          ''',
          )
          replace_once(
              "retrotui/core/viewer.py",
              '''    dialog = InputDialog('Open Video', 'Enter video path:', width=64)
              dialog.callback = lambda filepath: handle_video_path_input(app, filepath)
              app.dialog = dialog
          ''',
              '''    app.dialog = bind_dialog(
                  InputDialog('Open Video', 'Enter video path:', width=64),
                  workflow_id=DialogWorkflowId.CALLBACK,
                  on_accept=lambda filepath: handle_video_path_input(app, filepath),
              )
          ''',
          )
          replace_once(
              "retrotui/core/viewer.py",
              '''    dialog = InputDialog(
                  'Subtitles (Optional)',
                  'Enter subtitle path (.srt/.ass/.vtt) or leave empty:',
                  width=70,
              )
              dialog.callback = (
                  lambda subtitle_path, selected_video=video_path: handle_subtitle_path_input(
                      app,
                      selected_video,
                      subtitle_path,
                  )
              )
              app.dialog = dialog
          ''',
              '''    app.dialog = bind_dialog(
                  InputDialog(
                      'Subtitles (Optional)',
                      'Enter subtitle path (.srt/.ass/.vtt) or leave empty:',
                      width=70,
                  ),
                  workflow_id=DialogWorkflowId.CALLBACK,
                  on_accept=(
                      lambda subtitle_path, selected_video=video_path: handle_subtitle_path_input(
                          app,
                          selected_video,
                          subtitle_path,
                      )
                  ),
              )
          ''',
          )

          Path("tests/test_dialog_dispatch.py").write_text('''import unittest
          from types import SimpleNamespace

          from retrotui.core.actions import ActionResult, ActionType, AppAction
          from retrotui.core.dialog_dispatch import DialogDispatcher
          from retrotui.core.dialog_workflow import DialogWorkflowId, bind_dialog


          class DummyApp:
              def __init__(self):
                  self.called = {}
                  self.dialog = None
                  self.running = True

              def show_open_dialog(self, src):
                  self.called['show_open_dialog'] = src

              def open_file_viewer(self, payload):
                  self.called['open_file_viewer'] = payload

              def show_url_dialog(self, src, payload):
                  self.called['show_url_dialog'] = payload

              def _normalize_action(self, payload):
                  if payload == 'close':
                      return AppAction.CLOSE_WINDOW
                  return payload

              def close_window(self, src):
                  self.called['close_window'] = src

              def execute_action(self, action):
                  self.called.setdefault('execute_action', []).append(action)

              def _resolve_between_panes_destination(self, source_win, payload):
                  return None

              def _run_file_operation_with_progress(self, *args, **kwargs):
                  return None

              def show_kill_confirm_dialog(self, src, payload):
                  self.called['show_kill_confirm_dialog'] = payload

              def apply_preferences(self, **kwargs):
                  self.called['apply_preferences'] = kwargs

              def persist_config(self):
                  self.called['persist_config'] = True

              def get_active_window(self):
                  return self.called.get('active')

              def _dispatch_window_result(self, result, source):
                  self.called['dispatched'] = (result, source)


          class DialogDispatchTests(unittest.TestCase):
              def test_dispatch_basic_branches(self):
                  app = DummyApp()
                  dd = DialogDispatcher(app)
                  source = SimpleNamespace()

                  dd.dispatch_window_result('not an action', None)
                  dd.dispatch_window_result(ActionResult(ActionType.REQUEST_OPEN_PATH), source)
                  self.assertIs(app.called.get('show_open_dialog'), source)

                  dd.dispatch_window_result(ActionResult(ActionType.OPEN_FILE, '/tmp/file'), None)
                  self.assertEqual(app.called.get('open_file_viewer'), '/tmp/file')

                  dd.dispatch_window_result(ActionResult(ActionType.REQUEST_URL, 'http://x'), source)
                  self.assertEqual(app.called.get('show_url_dialog'), 'http://x')

                  dd.dispatch_window_result(ActionResult(ActionType.EXECUTE, 'close'), source)
                  self.assertIs(app.called.get('close_window'), source)

                  dd.dispatch_window_result(
                      ActionResult(ActionType.REQUEST_COPY_BETWEEN_PANES, {'a': 'b'}),
                      None,
                  )
                  self.assertIsNotNone(app.dialog)

                  app.dialog = None
                  dd.dispatch_window_result(ActionResult(ActionType.SAVE_ERROR, 'boom'), None)
                  self.assertIsNotNone(app.dialog)

                  dd.dispatch_window_result(
                      ActionResult(ActionType.UPDATE_CONFIG, {'show_hidden': True}),
                      None,
                  )
                  self.assertIsNotNone(app.called.get('apply_preferences'))
                  self.assertTrue(app.called.get('persist_config'))

              def test_exit_workflow_does_not_depend_on_visible_copy(self):
                  app = DummyApp()
                  dialog = SimpleNamespace(title='Salir', buttons=['Continuar', 'Volver'])
                  app.dialog = bind_dialog(
                      dialog,
                      workflow_id=DialogWorkflowId.EXIT,
                      on_accept=lambda: setattr(app, 'running', False),
                  )

                  DialogDispatcher(app).resolve_dialog_result(0)

                  self.assertFalse(app.running)
                  self.assertIsNone(app.dialog)

              def test_callback_result_is_delivered_to_captured_source(self):
                  app = DummyApp()
                  source = SimpleNamespace(id=7)
                  active = SimpleNamespace(id=8)
                  app.windows = [source, active]
                  app.called['active'] = active
                  result = ActionResult(ActionType.REFRESH)
                  dialog = SimpleNamespace(buttons=['OK'], value='new value')
                  app.dialog = bind_dialog(
                      dialog,
                      workflow_id=DialogWorkflowId.CALLBACK,
                      source_window=source,
                      on_accept=lambda value: result,
                  )

                  DialogDispatcher(app).resolve_dialog_result(0)

                  self.assertEqual(app.called.get('dispatched'), (result, source))

              def test_closed_source_cancels_callback_instead_of_using_active_window(self):
                  app = DummyApp()
                  source = SimpleNamespace(id=7)
                  app.windows = []
                  app.called['active'] = SimpleNamespace(id=8)
                  calls = []
                  dialog = SimpleNamespace(buttons=['OK'])
                  app.dialog = bind_dialog(
                      dialog,
                      workflow_id=DialogWorkflowId.CALLBACK,
                      source_window=source,
                      on_accept=lambda: calls.append(True),
                  )

                  DialogDispatcher(app).resolve_dialog_result(0)

                  self.assertEqual(calls, [])
                  self.assertNotIn('dispatched', app.called)
                  self.assertIsNone(app.dialog)

              def test_save_confirm_uses_accept_and_cancel_callbacks_not_title(self):
                  app = DummyApp()
                  source = SimpleNamespace(id=3)
                  app.windows = [source]
                  calls = []
                  dd = DialogDispatcher(app)

                  app.dialog = bind_dialog(
                      SimpleNamespace(title='Cambios pendientes', buttons=['Descartar', 'Volver']),
                      workflow_id=DialogWorkflowId.SAVE_CONFIRM,
                      source_window=source,
                      on_accept=lambda: calls.append('accept'),
                      on_cancel=lambda: calls.append('cancel'),
                  )
                  dd.resolve_dialog_result(0)

                  app.dialog = bind_dialog(
                      SimpleNamespace(title='Otro texto', buttons=['No', 'Sí']),
                      workflow_id=DialogWorkflowId.SAVE_CONFIRM,
                      source_window=source,
                      on_accept=lambda: calls.append('accept-2'),
                      on_cancel=lambda: calls.append('cancel'),
                  )
                  dd.resolve_dialog_result(1)

                  self.assertEqual(calls, ['accept', 'cancel'])

              def test_legacy_callback_remains_supported(self):
                  app = DummyApp()
                  calls = []
                  app.dialog = SimpleNamespace(
                      buttons=['OK'],
                      value='abc',
                      callback=lambda value: calls.append(value),
                  )

                  DialogDispatcher(app).resolve_dialog_result(0)

                  self.assertEqual(calls, ['abc'])

              def test_dispatch_save_confirm_forwards_payload(self):
                  app = DummyApp()
                  captured = {}

                  def fake_show(win, payload=None):
                      captured['win'] = win
                      captured['payload'] = payload

                  app._show_save_confirm_dialog = fake_show
                  source = SimpleNamespace()
                  payload = {'on_discard': lambda: None}

                  DialogDispatcher(app).dispatch_window_result(
                      ActionResult(ActionType.REQUEST_SAVE_CONFIRM, payload),
                      source,
                  )

                  self.assertIs(captured.get('win'), source)
                  self.assertIs(captured.get('payload'), payload)


          if __name__ == '__main__':
              unittest.main()
          ''', encoding="utf-8")
          PY

      - name: Compile dialog workflow changes
        run: |
          python -m py_compile \
            retrotui/core/dialog_workflow.py \
            retrotui/core/dialog_dispatch.py \
            retrotui/core/action_runner.py \
            retrotui/core/app.py \
            retrotui/core/file_operations.py \
            retrotui/core/viewer.py \
            tests/test_dialog_dispatch.py

      - name: Run focused dialog tests
        run: python -m unittest tests.test_dialog_dispatch -v

      - name: Run unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run pytest suite
        run: python -m pytest tests -q

      - name: Commit validated dialog workflow contract
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            retrotui/core/dialog_workflow.py \
            retrotui/core/dialog_dispatch.py \
            retrotui/core/action_runner.py \
            retrotui/core/app.py \
            retrotui/core/file_operations.py \
            retrotui/core/viewer.py \
            tests/test_dialog_dispatch.py
          git commit -m "core: bind dialogs to typed workflows"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
