name: Dialog Workflow Fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply_dialog_workflow_fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Prepare and apply dialog workflow patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tools/apply_dialog_workflow_fix.py")
          text = path.read_text(encoding="utf-8")
          old = '''def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}")
              file_path.write_text(text.replace(old, new), encoding="utf-8")
          '''
          new = '''def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              matches = []
              for prefix in ("", "    ", "        ", "            "):
                  candidate = indent(old, prefix) if prefix else old
                  count = text.count(candidate)
                  if count:
                      replacement = indent(new, prefix) if prefix else new
                      matches.append((candidate, replacement, count))
              total = sum(count for _, _, count in matches)
              if total != 1:
                  raise SystemExit(f"{path}: expected one indented match, found {total}")
              candidate, replacement, _ = matches[0]
              file_path.write_text(text.replace(candidate, replacement, 1), encoding="utf-8")
          '''
          if text.count(old) != 1:
              raise SystemExit("replace_once helper mismatch")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          python tools/apply_dialog_workflow_fix.py

      - name: Preserve legacy callback alias and update source-owner tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}")
              p.write_text(text.replace(old, new), encoding="utf-8")

          replace_once(
              "retrotui/core/dialog_workflow.py",
              '''    dialog.on_accept = on_accept
              dialog.on_cancel = on_cancel
              return dialog
          ''',
              '''    dialog.on_accept = on_accept
              dialog.on_cancel = on_cancel
              # Transitional public alias for existing integrations and tests.
              if callable(on_accept):
                  dialog.callback = on_accept
              return dialog
          ''',
          )

          replace_once(
              "tests/test_core_app.py",
              '''    def test_resolve_dialog_result_dispatches_input_callback_result(self):
                  app = self._make_app()
                  dialog = self.app_mod.InputDialog("Save As", "Enter filename:")
                  dialog.value = "note.txt"
                  callback_result = self.actions_mod.ActionResult(
                      self.actions_mod.ActionType.REQUEST_SAVE_AS
                  )
                  dialog.callback = mock.Mock(return_value=callback_result)
                  app.dialog = dialog
                  app._dispatch_window_result = mock.Mock()
                  app.get_active_window = mock.Mock(return_value="active-window")

                  app._resolve_dialog_result(0)

                  dialog.callback.assert_called_once_with("note.txt")
                  app._dispatch_window_result.assert_called_once_with(
                      callback_result, "active-window"
                  )
          ''',
              '''    def test_resolve_dialog_result_dispatches_input_callback_result(self):
                  app = self._make_app()
                  source = types.SimpleNamespace(id=71)
                  app.windows = [source]
                  callback_result = self.actions_mod.ActionResult(
                      self.actions_mod.ActionType.REQUEST_SAVE_AS
                  )
                  callback = mock.Mock(return_value=callback_result)
                  dialog = self.app_mod.bind_dialog(
                      self.app_mod.InputDialog("Save As", "Enter filename:"),
                      workflow_id=self.app_mod.DialogWorkflowId.CALLBACK,
                      source_window=source,
                      on_accept=callback,
                  )
                  dialog.value = "note.txt"
                  app.dialog = dialog
                  app._dispatch_window_result = mock.Mock()
                  app.get_active_window = mock.Mock(return_value="active-window")

                  app._resolve_dialog_result(0)

                  callback.assert_called_once_with("note.txt")
                  app._dispatch_window_result.assert_called_once_with(
                      callback_result, source
                  )
                  app.get_active_window.assert_not_called()
          ''',
          )

          replace_once(
              "tests/test_core_app.py",
              '''    def test_resolve_dialog_result_dispatches_dialog_callback_result(self):
                  app = self._make_app()
                  dialog = self.app_mod.Dialog("Confirm", "Delete?", ["Delete", "Cancel"])
                  callback_result = self.actions_mod.ActionResult(
                      self.actions_mod.ActionType.ERROR, "x"
                  )
                  dialog.callback = mock.Mock(return_value=callback_result)
                  app.dialog = dialog
                  app._dispatch_window_result = mock.Mock()
                  app.get_active_window = mock.Mock(return_value="active-window")

                  app._resolve_dialog_result(0)

                  dialog.callback.assert_called_once_with()
                  app._dispatch_window_result.assert_called_once_with(
                      callback_result, "active-window"
                  )
          ''',
              '''    def test_resolve_dialog_result_dispatches_dialog_callback_result(self):
                  app = self._make_app()
                  source = types.SimpleNamespace(id=72)
                  app.windows = [source]
                  callback_result = self.actions_mod.ActionResult(
                      self.actions_mod.ActionType.ERROR, "x"
                  )
                  callback = mock.Mock(return_value=callback_result)
                  app.dialog = self.app_mod.bind_dialog(
                      self.app_mod.Dialog("Confirm", "Delete?", ["Delete", "Cancel"]),
                      workflow_id=self.app_mod.DialogWorkflowId.CALLBACK,
                      source_window=source,
                      on_accept=callback,
                  )
                  app._dispatch_window_result = mock.Mock()
                  app.get_active_window = mock.Mock(return_value="active-window")

                  app._resolve_dialog_result(0)

                  callback.assert_called_once_with()
                  app._dispatch_window_result.assert_called_once_with(
                      callback_result, source
                  )
                  app.get_active_window.assert_not_called()
          ''',
          )

          replace_once(
              "tests/test_core_app.py",
              '''    def test_resolve_dialog_result_exit_yes_stops_app(self):
                  app = self._make_app()
                  app.dialog = types.SimpleNamespace(title="Exit RetroTUI", buttons=["Yes", "No"])
                  app.running = True

                  app._resolve_dialog_result(0)

                  self.assertFalse(app.running)
          ''',
              '''    def test_resolve_dialog_result_exit_yes_stops_app(self):
                  app = self._make_app()
                  app.running = True
                  app.execute_action(self.actions_mod.AppAction.EXIT)
                  # Visible copy may change without changing the workflow contract.
                  app.dialog.title = "Salir"
                  app.dialog.buttons = ["Continuar", "Volver"]

                  app._resolve_dialog_result(0)

                  self.assertFalse(app.running)
          ''',
          )

          replace_once(
              "tests/test_core_app.py",
              '''        win = _FakeNotepad()
                  app._show_save_confirm_dialog(win, payload={'on_discard': win._do_open_path_force})
                  # Dialog must be set.
                  self.assertIsNotNone(app.dialog)
                  self.assertEqual(app.dialog.title, "Discard unsaved changes?")
                  # The pending callback must be wired to the payload's on_discard.
                  self.assertIsNotNone(getattr(app, "_pending_discard_callback", None))
                  # Trigger Discard via resolve_dialog_result(0).
                  app._resolve_dialog_result(0)
                  self.assertEqual(len(discard_calls), 1)
          ''',
              '''        win = _FakeNotepad()
                  win.id = 73
                  app.windows = [win]
                  app._show_save_confirm_dialog(win, payload={'on_discard': win._do_open_path_force})
                  self.assertIsNotNone(app.dialog)
                  self.assertEqual(app.dialog.title, "Discard unsaved changes?")
                  self.assertEqual(app.dialog.workflow_id, "document.save_confirm")
                  self.assertIs(app.dialog.source_window, win)
                  self.assertTrue(callable(app.dialog.on_accept))
                  app._resolve_dialog_result(0)
                  self.assertEqual(len(discard_calls), 1)
          ''',
          )
          PY

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[test]"

      - name: Compile changed Python files
        run: |
          python -m py_compile \
            retrotui/core/dialog_workflow.py \
            retrotui/core/dialog_dispatch.py \
            retrotui/core/action_runner.py \
            retrotui/core/app.py \
            retrotui/core/file_operations.py \
            retrotui/core/viewer.py \
            tests/test_dialog_dispatch.py \
            tests/test_core_app.py

      - name: Run focused dialog tests
        run: python -m unittest tests.test_dialog_dispatch -v

      - name: Run unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run pytest suite
        run: python -m pytest tests -q

      - name: Remove temporary patch machinery
        run: git rm -f tools/apply_dialog_workflow_fix.py .github/workflows/dialog-workflow-fix.yml

      - name: Commit validated dialog workflows
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "core: bind dialogs to typed workflows"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
