name: Dialog Workflow Fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply_dialog_workflow_fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[test]"

      - name: Apply dialog workflow patch
        run: python tools/apply_dialog_workflow_fix.py

      - name: Compile changed Python files
        run: |
          python -m py_compile \
            retrotui/core/dialog_workflow.py \
            retrotui/core/dialog_dispatch.py \
            retrotui/core/action_runner.py \
            retrotui/core/app.py \
            retrotui/core/file_operations.py \
            retrotui/core/viewer.py \
            tests/test_dialog_dispatch.py

      - name: Run focused dialog tests
        run: python -m unittest tests.test_dialog_dispatch -v

      - name: Run unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run pytest suite
        run: python -m pytest tests -q

      - name: Remove temporary patch machinery
        run: git rm tools/apply_dialog_workflow_fix.py .github/workflows/dialog-workflow-fix.yml

      - name: Commit validated dialog workflows
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "core: bind dialogs to typed workflows"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
