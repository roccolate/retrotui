name: Dialog Workflow Fix

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose_dialog_regressions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Preserve source indentation in patch helper
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("tools/apply_dialog_workflow_fix.py")
          text = path.read_text(encoding="utf-8")
          old = '''def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}")
              file_path.write_text(text.replace(old, new), encoding="utf-8")
          '''
          new = '''def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding="utf-8")
              matches = []
              for prefix in ("", "    ", "        ", "            "):
                  candidate = indent(old, prefix) if prefix else old
                  count = text.count(candidate)
                  if count:
                      replacement = indent(new, prefix) if prefix else new
                      matches.append((candidate, replacement, count))
              total = sum(count for _, _, count in matches)
              if total != 1:
                  raise SystemExit(f"{path}: expected one indented match, found {total}")
              candidate, replacement, _ = matches[0]
              file_path.write_text(text.replace(candidate, replacement, 1), encoding="utf-8")
          '''
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY

      - name: Apply dialog workflow patch
        run: python tools/apply_dialog_workflow_fix.py

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[test]"

      - name: Capture full-suite diagnostics
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -v > unittest.log 2>&1
          unittest_status=$?
          python -m pytest tests -q > pytest.log 2>&1
          pytest_status=$?
          {
            echo "unittest_status=${unittest_status}"
            echo "pytest_status=${pytest_status}"
            echo "=== unittest tail ==="
            tail -n 260 unittest.log
            echo "=== pytest tail ==="
            tail -n 360 pytest.log
          } > dialog-regressions.txt

      - name: Upload regression diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: dialog-regressions
          path: dialog-regressions.txt
