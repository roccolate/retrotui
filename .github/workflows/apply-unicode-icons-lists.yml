name: Apply Unicode icons and lists

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: unicode-icons-lists-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: ${{ github.head_ref == 'agent/unicode-icons-lists' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: agent/unicode-icons-lists
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Align duplicate App Manager replacements
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('tools/apply_unicode_icons_lists.py')
          text = path.read_text(encoding='utf-8')
          old = '''    count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{relative}: expected one exact match, found {count}")
              _write(relative, text.replace(old, new, 1))
          '''
          new = '''    count = text.count(old)
              expected = 2 if relative == "retrotui/apps/app_manager.py" and count == 2 else 1
              if count != expected:
                  raise RuntimeError(
                      f"{relative}: expected {expected} exact match(es), found {count}"
                  )
              _write(relative, text.replace(old, new, expected))
          '''
          if text.count(old) != 1:
              raise SystemExit('replace_once implementation not found exactly once')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Apply Unicode patch
        id: apply
        shell: bash
        run: |
          set +e
          python tools/apply_unicode_icons_lists.py 2>&1 | tee unicode-icons-lists-apply.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload applicator diagnostics
        if: ${{ failure() && steps.apply.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: unicode-icons-lists-apply-log
          path: unicode-icons-lists-apply.log

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'

      - name: Run focused regressions
        run: >-
          python -m pytest
          tests/test_unicode_icons_lists.py
          tests/test_icon_manager.py
          tests/test_rendering.py
          tests/test_filemanager_extra.py
          tests/test_filemanager_additional.py
          tests/test_process_manager.py
          tests/test_app_manager.py
          -q

      - name: Run repository quality checks
        run: python tools/qa.py --skip-tests

      - name: Reject undefined Python names
        run: python -m ruff check --select F821 retrotui tests tools

      - name: Run full unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run full pytest suite
        run: python -m pytest tests -q

      - name: Enforce module coverage floor
        run: python tools/report_module_coverage.py --quiet-tests --top 20 --fail-under 75.0

      - name: Publish verified patch
        shell: bash
        run: |
          rm -f unicode-icons-lists-apply.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Use physical columns for icons and lists'
          git push origin HEAD:agent/unicode-icons-lists
