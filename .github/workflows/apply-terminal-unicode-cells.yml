name: Apply terminal Unicode cells

on:
  push:
    branches:
      - agent/terminal-unicode-cells
    paths:
      - tools/_apply_terminal_unicode_cells.py
      - .github/workflows/apply-terminal-unicode-cells.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: agent/terminal-unicode-cells
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Apply asserted patch
        run: python tools/_apply_terminal_unicode_cells.py

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'

      - name: Run focused Unicode regressions
        run: >-
          python -m unittest
          tests.test_terminal_unicode_cells
          tests.test_terminal_screen_buffer
          tests.test_terminal_component
          -v

      - name: Run repository quality checks
        run: |
          python tools/qa.py --skip-tests
          python -m ruff check --select F821 retrotui tests tools

      - name: Run full test and coverage gates
        run: |
          python -m unittest discover -s tests -q
          python -m pytest tests -q
          python tools/report_module_coverage.py --quiet-tests --top 20 --fail-under 75.0

      - name: Remove one-shot machinery
        run: |
          rm tools/_apply_terminal_unicode_cells.py
          rm .github/workflows/apply-terminal-unicode-cells.yml
          git diff --check

      - name: Commit implementation
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Implement Unicode terminal cell semantics'
          git push origin HEAD:agent/terminal-unicode-cells
