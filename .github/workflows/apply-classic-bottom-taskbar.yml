name: Apply classic bottom taskbar

on:
  push:
    branches:
      - agent/classic-bottom-taskbar
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: classic-bottom-taskbar-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: ${{ github.actor != 'github-actions[bot]' && (github.event_name != 'pull_request' || github.head_ref == 'agent/classic-bottom-taskbar') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: agent/classic-bottom-taskbar
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Repair bootstrap replacement handling
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tools/bootstrap_classic_bottom_taskbar.py')
          text = path.read_text(encoding='utf-8')
          old = 'updated, count = re.subn(pattern, replacement, source, count=1, flags=re.DOTALL)'
          new = 'updated, count = re.subn(pattern, lambda _match: replacement, source, count=1, flags=re.DOTALL)'
          if text.count(old) != 1:
              raise SystemExit('bootstrap replacement line not found exactly once')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Apply classic bottom taskbar patch
        run: python tools/bootstrap_classic_bottom_taskbar.py

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'

      - name: Run focused regressions
        id: focused
        shell: bash
        run: |
          set +e
          python -m pytest tests/test_classic_bottom_taskbar.py tests/test_menu_bar.py tests/test_rendering.py tests/test_event_loop.py tests/test_mouse_router.py tests/test_window_component.py -vv --tb=short 2>&1 | tee classic-bottom-taskbar-test.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Publish focused-test diagnostics
        if: ${{ failure() && steps.focused.outcome == 'failure' }}
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add classic-bottom-taskbar-test.log
          git commit -m 'Capture bottom taskbar test diagnostics'
          git push origin HEAD:agent/classic-bottom-taskbar

      - name: Run repository quality checks
        run: python tools/qa.py --skip-tests

      - name: Reject undefined Python names
        run: python -m ruff check --select F821 retrotui tests tools

      - name: Run full unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run full pytest suite
        run: python -m pytest tests -q

      - name: Enforce module coverage floor
        run: python tools/report_module_coverage.py --quiet-tests --top 20 --fail-under 75.0

      - name: Publish verified patch
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Move shell bar to bottom'
          git push origin HEAD:agent/classic-bottom-taskbar
