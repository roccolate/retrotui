name: Apply classic bottom taskbar

on:
  push:
    branches:
      - agent/classic-bottom-taskbar
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: classic-bottom-taskbar-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: ${{ github.actor != 'github-actions[bot]' && (github.event_name != 'pull_request' || github.head_ref == 'agent/classic-bottom-taskbar') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: agent/classic-bottom-taskbar
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Repair bootstrap replacement handling
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tools/bootstrap_classic_bottom_taskbar.py')
          text = path.read_text(encoding='utf-8')
          old = 'updated, count = re.subn(pattern, replacement, source, count=1, flags=re.DOTALL)'
          new = 'updated, count = re.subn(pattern, lambda _match: replacement, source, count=1, flags=re.DOTALL)'
          if text.count(old) != 1:
              raise SystemExit('bootstrap replacement line not found exactly once')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Apply classic bottom taskbar patch
        run: python tools/bootstrap_classic_bottom_taskbar.py

      - name: Align legacy geometry expectations
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path_name, old, new):
              path = Path(path_name)
              text = path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path_name}: expected one match, found {count}: {old!r}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'tests/test_rendering.py',
              '                and call.args[2] == 22\n',
              '                and call.args[2] == 21\n',
          )
          replace_once(
              'tests/test_mouse_router.py',
              '        # Right side of unified top bar overlaps clock hotspot; taskbar must win.\n'
              '        self.mouse_router.handle_mouse_event(app, (0, 79, 0, 0, self.curses.BUTTON1_CLICKED))\n\n'
              '        app.handle_taskbar_click.assert_called_once_with(79, 0)\n',
              '        # Right side of the bottom taskbar overlaps the clock hotspot; taskbar must win.\n'
              '        self.mouse_router.handle_mouse_event(app, (0, 79, 24, 0, self.curses.BUTTON1_CLICKED))\n\n'
              '        app.handle_taskbar_click.assert_called_once_with(79, 24)\n',
          )
          replace_once(
              'tests/test_mouse_router.py',
              '        self.mouse_router.handle_mouse_event(app, (0, 79, 0, 0, self.curses.BUTTON1_CLICKED))\n\n'
              '        app.execute_action.assert_called_once_with("plugin:clock")\n',
              '        self.mouse_router.handle_mouse_event(app, (0, 79, 24, 0, self.curses.BUTTON1_CLICKED))\n\n'
              '        app.execute_action.assert_called_once_with("plugin:clock")\n',
          )
          replace_once(
              'tests/test_mouse_router.py',
              '    def test_handle_mouse_event_top_bar_free_space_can_route_taskbar(self):\n',
              '    def test_handle_mouse_event_bottom_bar_free_space_can_route_taskbar(self):\n',
          )
          replace_once(
              'tests/test_mouse_router.py',
              '        self.mouse_router.handle_mouse_event(app, (0, 40, 0, 0, self.curses.BUTTON1_CLICKED))\n\n'
              '        app.menu.handle_click.assert_not_called()\n'
              '        app.handle_taskbar_click.assert_called_once_with(40, 0)\n',
              '        self.mouse_router.handle_mouse_event(app, (0, 40, 24, 0, self.curses.BUTTON1_CLICKED))\n\n'
              '        app.menu.handle_click.assert_not_called()\n'
              '        app.handle_taskbar_click.assert_called_once_with(40, 24)\n',
          )
          replace_once(
              'tests/test_window_component.py',
              '        self.assertEqual((win.x, win.y, win.w, win.h), (0, 1, 120, 39))\n'
              '        self.assertEqual(win.y + win.h, 40)\n',
              '        self.assertEqual((win.x, win.y, win.w, win.h), (0, 0, 120, 39))\n'
              '        self.assertEqual(win.y + win.h, 39)\n',
          )
          replace_once(
              'tests/test_window_component.py',
              '        self.assertEqual((win.x, win.y), (50, 20))\n',
              '        self.assertEqual((win.x, win.y), (50, 19))\n',
          )
          replace_once(
              'tests/test_window_component.py',
              '        self.assertEqual(win.h, 35)  # clamped by term_h - y\n',
              '        self.assertEqual(win.h, 34)  # reserves the bottom taskbar row\n',
          )
          PY

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'

      - name: Run focused regressions
        id: focused
        shell: bash
        run: |
          set +e
          python -m pytest tests/test_classic_bottom_taskbar.py tests/test_menu_bar.py tests/test_rendering.py tests/test_event_loop.py tests/test_mouse_router.py tests/test_window_component.py -vv --tb=short 2>&1 | tee classic-bottom-taskbar-test.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload focused-test diagnostics
        if: ${{ failure() && steps.focused.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: classic-bottom-taskbar-test-log
          path: classic-bottom-taskbar-test.log

      - name: Run repository quality checks
        run: python tools/qa.py --skip-tests

      - name: Reject undefined Python names
        run: python -m ruff check --select F821 retrotui tests tools

      - name: Run full unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run full pytest suite
        run: python -m pytest tests -q

      - name: Enforce module coverage floor
        run: python tools/report_module_coverage.py --quiet-tests --top 20 --fail-under 75.0

      - name: Publish verified patch
        shell: bash
        run: |
          rm -f classic-bottom-taskbar-test.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Move shell bar to bottom'
          git push origin HEAD:agent/classic-bottom-taskbar
