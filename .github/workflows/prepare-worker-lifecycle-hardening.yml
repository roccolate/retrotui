name: Prepare worker lifecycle hardening

on:
  push:
    branches:
      - hardening/core-worker-lifecycle
    paths:
      - tools/prepare_worker_lifecycle_hardening.py
      - tools/refine_worker_lifecycle_hardening.py
      - .github/workflows/prepare-worker-lifecycle-hardening.yml
  pull_request:
    branches:
      - hardening/core-contracts
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    if: github.head_ref == 'hardening/core-worker-lifecycle' || github.ref == 'refs/heads/hardening/core-worker-lifecycle'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: hardening/core-worker-lifecycle
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Apply deterministic hardening patch
        run: |
          python tools/prepare_worker_lifecycle_hardening.py
          python tools/refine_worker_lifecycle_hardening.py

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Repository QA
        run: python tools/qa.py --skip-tests

      - name: Reject undefined names
        run: python -m ruff check --select F821 retrotui tests tools

      - name: Capture unittest report
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -v > unittest-report.txt 2>&1
          status=$?
          tail -n 160 unittest-report.txt
          echo "UNITTEST_STATUS=$status" >> "$GITHUB_ENV"
          exit 0

      - name: Upload unittest report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: worker-lifecycle-unittest-report
          path: unittest-report.txt

      - name: Enforce unittest suite
        shell: bash
        run: test "${UNITTEST_STATUS}" -eq 0

      - name: Run pytest suite
        run: python -m pytest tests -q

      - name: Enforce coverage floor
        run: >-
          python tools/report_module_coverage.py
          --quiet-tests
          --top 20
          --fail-under 75.0

      - name: Package validated payload
        run: |
          tar -czf worker-lifecycle-hardening.tar.gz \
            retrotui/core/worker_scope.py \
            retrotui/ui/window.py \
            retrotui/core/app.py \
            retrotui/core/file_operations.py \
            retrotui/apps/terminal.py \
            retrotui/apps/image_viewer.py \
            retrotui/apps/filemanager/window.py \
            retrotui/apps/wifi_manager.py \
            retrotui/apps/retronet.py \
            tests/test_worker_lifecycle.py

      - name: Upload validated payload
        uses: actions/upload-artifact@v5
        with:
          name: worker-lifecycle-hardening
          path: worker-lifecycle-hardening.tar.gz

      - name: Create validated Git commit object
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import subprocess
          import urllib.request

          repository = os.environ["GH_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          api_base = f"https://api.github.com/repos/{repository}"
          paths = [
              "retrotui/core/worker_scope.py",
              "retrotui/ui/window.py",
              "retrotui/core/app.py",
              "retrotui/core/file_operations.py",
              "retrotui/apps/terminal.py",
              "retrotui/apps/image_viewer.py",
              "retrotui/apps/filemanager/window.py",
              "retrotui/apps/wifi_manager.py",
              "retrotui/apps/retronet.py",
              "tests/test_worker_lifecycle.py",
          ]

          def request(method, path, payload):
              body = json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(
                  api_base + path,
                  data=body,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )
              with urllib.request.urlopen(req, timeout=60) as response:
                  return json.load(response)

          parent = subprocess.check_output(
              ["git", "rev-parse", "HEAD"], text=True
          ).strip()
          base_tree = subprocess.check_output(
              ["git", "rev-parse", "HEAD^{tree}"], text=True
          ).strip()

          tree = []
          for path in paths:
              with open(path, "rb") as stream:
                  encoded = base64.b64encode(stream.read()).decode("ascii")
              blob = request("POST", "/git/blobs", {
                  "content": encoded,
                  "encoding": "base64",
              })
              tree.append({
                  "path": path,
                  "mode": "100644",
                  "type": "blob",
                  "sha": blob["sha"],
              })

          for temporary_path in (
              "tools/prepare_worker_lifecycle_hardening.py",
              "tools/refine_worker_lifecycle_hardening.py",
          ):
              tree.append({
                  "path": temporary_path,
                  "mode": "100644",
                  "type": "blob",
                  "sha": None,
              })

          new_tree = request("POST", "/git/trees", {
              "base_tree": base_tree,
              "tree": tree,
          })
          commit = request("POST", "/git/commits", {
              "message": "Harden global shutdown and worker ownership",
              "tree": new_tree["sha"],
              "parents": [parent],
          })
          with open("prepared-commit.txt", "w", encoding="utf-8") as stream:
              stream.write(commit["sha"] + "\n")
          print(f"Prepared commit object: {commit['sha']}")
          PY

      - name: Upload prepared commit SHA
        uses: actions/upload-artifact@v5
        with:
          name: worker-lifecycle-prepared-commit
          path: prepared-commit.txt
