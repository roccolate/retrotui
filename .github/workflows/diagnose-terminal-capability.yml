name: Diagnose terminal capability contract

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    if: github.event.issue.title == '[maintenance] diagnose terminal capability contract'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout capability branch
        uses: actions/checkout@v5
        with:
          ref: agent/terminal-capability-contract
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'

      - name: Run diagnostics
        id: diagnostics
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            echo '=== UNITTEST ==='
            python -m unittest discover -s tests -v
            echo '=== COVERAGE ==='
            python tools/report_module_coverage.py --quiet-tests --top 20 --fail-under 75.0
          } 2>&1 | tee /tmp/terminal-capability-diagnostics.log

      - name: Publish diagnostic tail
        if: always()
        shell: bash
        run: |
          {
            echo 'Terminal capability diagnostic result: `${{ steps.diagnostics.outcome }}`'
            echo
            echo '```text'
            tail -n 180 /tmp/terminal-capability-diagnostics.log
            echo '```'
          } > /tmp/comment.md
          gh issue comment '${{ github.event.issue.number }}' --repo '${{ github.repository }}' --body-file /tmp/comment.md
