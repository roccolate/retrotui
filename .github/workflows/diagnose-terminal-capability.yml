name: Diagnose terminal capability contract

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    if: github.event.issue.title == '[maintenance] diagnose terminal capability contract v3'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout capability branch
        uses: actions/checkout@v5
        with:
          ref: agent/terminal-capability-contract
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'

      - name: Run quiet full suite
        id: diagnostics
        continue-on-error: true
        shell: bash
        run: |
          python -m unittest discover -s tests -q > /tmp/unit.log 2>&1

      - name: Publish diagnostic tail
        if: always()
        shell: bash
        run: |
          {
            echo 'Terminal capability full-suite result: `${{ steps.diagnostics.outcome }}`'
            echo
            echo '```text'
            tail -n 140 /tmp/unit.log
            echo '```'
          } > /tmp/comment.md
          gh issue comment '${{ github.event.issue.number }}' --repo '${{ github.repository }}' --body-file /tmp/comment.md
