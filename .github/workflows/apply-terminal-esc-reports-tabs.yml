name: Apply terminal ESC reports and tabs

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: apply-terminal-esc-reports-tabs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/terminal-esc-reports-tabs'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v5
        with:
          ref: agent/terminal-esc-reports-tabs
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Apply asserted changes
        run: python tools/_apply_terminal_esc_reports_tabs.py

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run focused terminal regressions
        run: |
          python -m unittest tests.test_ansi_basic -v
          python -m unittest tests.test_terminal_component -v

      - name: Run repository quality checks
        run: python tools/qa.py --skip-tests

      - name: Reject undefined Python names
        run: python -m ruff check --select F821 retrotui tests tools

      - name: Run full unittest suite
        run: python -m unittest discover -s tests -v

      - name: Run full pytest suite
        run: python -m pytest tests -q

      - name: Enforce module coverage floor
        run: python tools/report_module_coverage.py --quiet-tests --top 20 --fail-under 75.0

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git commit -m "Implement ESC dispatch reports and tab stops"
          git push
